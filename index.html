<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>shell</title>
    <meta name="description" content="A quiet shell-style personal page." />
    <meta name="theme-color" content="#000000" />
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='black'/%3E%3Cpath d='M14 38l8-8-8-8' fill='none' stroke='%23d7d7d7' stroke-width='5' stroke-linecap='square' stroke-linejoin='round'/%3E%3Cpath d='M30 44h20' stroke='%23d7d7d7' stroke-width='5' stroke-linecap='square'/%3E%3C/svg%3E" />
    <style>
        :root {
            color-scheme: dark;
            --bg: #000;
            --panel: #050505;
            --panel-2: #090909;
            --border: #1c1c1c;
            --fg: #d7d7d7;
            --dim: #808080;
            --blue: #5fafff;
            --green: #87d787;
            --red: #ff5f5f;
            --yellow: #d7af5f;
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: var(--mono);
            font-size: 15px;
            line-height: 1.38;
            letter-spacing: 0;
        }

        body {
            height: 100svh;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            overflow: hidden;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .topbar {
            min-height: 42px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 0 12px;
            border-bottom: 1px solid #1c1c1c;
            background: #050505;
        }

        .topbar-status {
            color: var(--dim);
            white-space: nowrap;
        }

        .topbar-status strong {
            color: var(--fg);
            font-weight: 400;
        }

        .topbar-login {
            color: var(--green);
        }

        .topbar-links {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            flex-wrap: wrap;
        }

        .topbar-links a {
            min-height: 28px;
            display: inline-flex;
            align-items: center;
            border: 1px solid transparent;
            border-radius: 3px;
            padding: 0 8px;
            color: var(--fg);
        }

        .topbar-links a:hover,
        .topbar-links a:focus-visible {
            border-color: #303030;
            background: #101010;
            color: var(--green);
            outline: none;
        }

        .workspace {
            min-height: 0;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 0fr);
            align-items: stretch;
            gap: 0;
            padding: 18px;
            overflow: hidden;
            transition: grid-template-columns 420ms cubic-bezier(.2, .8, .2, 1), gap 420ms cubic-bezier(.2, .8, .2, 1), padding 420ms ease;
        }

        .workspace.reader-open {
            grid-template-columns: minmax(360px, .86fr) minmax(420px, 1.14fr);
            gap: 14px;
        }

        .terminal-frame,
        .reader {
            min-width: 0;
            height: 100%;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            background: #030303;
            box-shadow: 0 24px 80px rgba(0, 0, 0, .38), inset 0 1px 0 rgba(255, 255, 255, .04);
            overflow: hidden;
        }

        .terminal-frame {
            width: min(960px, 100%);
            justify-self: center;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            transition: width 420ms cubic-bezier(.2, .8, .2, 1), transform 420ms cubic-bezier(.2, .8, .2, 1);
        }

        .workspace.reader-open .terminal-frame {
            width: 100%;
            justify-self: stretch;
        }

        .workspace.reader-open .help-command {
            min-width: 24ch;
        }

        .window-bar {
            min-height: 34px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #1b1b1b;
            background: linear-gradient(180deg, #101010, #070707);
            padding: 0 12px;
            color: var(--dim);
        }

        .window-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff5f57;
            box-shadow: 16px 0 0 #ffbd2e, 32px 0 0 #28c840;
            flex: 0 0 auto;
        }

        .window-title {
            min-width: 0;
            margin-left: 34px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: .86rem;
            color: #9a9a9a;
        }

        #terminal {
            min-width: 0;
            height: 100%;
            padding: 10px 12px;
            overflow: auto;
            outline: none;
            white-space: pre-wrap;
            word-break: break-word;
            cursor: text;
            user-select: text;
            transition: background-color 420ms ease, padding 420ms ease;
        }

        .workspace.reader-open #terminal {
            background: #020202;
        }

        .line {
            min-height: 1.38em;
            user-select: text;
        }

        .prompt {
            color: var(--green);
        }

        .path {
            color: var(--blue);
        }

        .error {
            color: var(--red);
        }

        .dim {
            color: var(--dim);
        }

        .dir {
            color: var(--blue);
            font-weight: 700;
        }

        .exe {
            color: var(--green);
            font-weight: 700;
        }

        .warn {
            color: var(--yellow);
        }

        .cmd-command,
        .cmd-action {
            color: var(--green);
            font-weight: 700;
        }

        .cmd-number,
        .cmd-link {
            color: var(--blue);
        }

        .cmd-flag {
            color: var(--yellow);
        }

        .help-command {
            display: inline-block;
            min-width: 30ch;
            vertical-align: top;
        }

        .help-desc {
            color: var(--dim);
        }

        .input-slot {
            position: relative;
            display: inline-block;
            min-width: 2ch;
            width: min(74ch, calc(100% - 22ch));
            vertical-align: baseline;
        }

        .input-mirror {
            display: block;
            min-height: 1.38em;
            white-space: pre-wrap;
            word-break: break-word;
            pointer-events: none;
        }

        .input-mirror:empty::after {
            content: "\00a0";
        }

        .terminal-input {
            display: inline-block;
            position: absolute;
            inset: 0;
            width: 100%;
            min-width: 2ch;
            border: 0;
            outline: 0;
            padding: 0;
            background: transparent;
            color: transparent;
            font: inherit;
            line-height: inherit;
            caret-color: var(--fg);
            vertical-align: baseline;
            appearance: none;
            border-radius: 0;
            user-select: text;
        }

        .terminal-input::placeholder {
            color: #505050;
        }

        .hint {
            color: var(--dim);
        }

        .kbd {
            color: var(--fg);
        }

        .reader {
            background: linear-gradient(180deg, var(--panel-2), var(--panel));
            opacity: 0;
            transform: translateX(18px);
            pointer-events: none;
            user-select: text;
            transition: opacity 340ms ease, transform 420ms cubic-bezier(.2, .8, .2, 1);
        }

        .workspace.reader-open .reader {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .reader-inner {
            height: 100%;
            display: grid;
            grid-template-rows: auto auto minmax(0, 1fr);
        }

        .reader-head {
            min-height: 42px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            align-items: center;
            gap: 8px;
            padding: 0 10px 0 12px;
            border-bottom: 1px solid var(--border);
            background: #030303;
        }

        .reader-title {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--fg);
        }

        .reader-link,
        .reader-close {
            min-height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid transparent;
            border-radius: 3px;
            background: transparent;
            color: var(--dim);
            font: inherit;
            padding: 0 8px;
            cursor: pointer;
        }

        .reader-link:hover,
        .reader-link:focus-visible,
        .reader-close:hover,
        .reader-close:focus-visible {
            border-color: #303030;
            color: var(--green);
            outline: none;
        }

        .reader-body {
            min-height: 0;
            overflow: auto;
            padding: 18px 20px 28px;
            color: #d0d0d0;
            white-space: normal;
            word-break: normal;
            overflow-wrap: anywhere;
            user-select: text;
        }

        .reader-loading {
            color: var(--dim);
            white-space: pre-wrap;
        }

        .doc {
            max-width: 860px;
            margin: 0 auto;
            overflow-wrap: anywhere;
        }

        .doc-kicker {
            margin: 0 0 10px;
            color: var(--green);
            font-size: .86rem;
        }

        .doc h1 {
            margin: 0 0 14px;
            color: #f2f2f2;
            font-size: clamp(1.45rem, 2.6vw, 2rem);
            line-height: 1.22;
            font-weight: 700;
        }

        .doc h2,
        .doc h3 {
            margin: 24px 0 10px;
            color: #eeeeee;
            line-height: 1.28;
        }

        .doc h2 {
            font-size: 1.22rem;
            border-bottom: 1px solid #202020;
            padding-bottom: 7px;
        }

        .doc h3 {
            font-size: 1.05rem;
        }

        .doc p,
        .doc li {
            line-height: 1.76;
            overflow-wrap: anywhere;
        }

        .doc p {
            margin: 0 0 13px;
        }

        .doc ul,
        .doc ol {
            padding-left: 1.4rem;
        }

        .doc code {
            border: 1px solid #242424;
            border-radius: 3px;
            background: #0c0c0c;
            color: var(--green);
            padding: 1px 4px;
        }

        .doc pre {
            overflow: auto;
            max-width: 100%;
            border: 1px solid #202020;
            border-radius: 5px;
            background: #050505;
            padding: 12px;
            line-height: 1.55;
        }

        .doc pre code {
            border: 0;
            background: transparent;
            padding: 0;
            color: #d7d7d7;
        }

        .doc blockquote {
            margin: 14px 0;
            border-left: 3px solid #303030;
            padding-left: 12px;
            color: #a8a8a8;
        }

        .doc a {
            color: var(--green);
            text-decoration: underline;
            text-underline-offset: 2px;
            text-decoration-thickness: 1px;
        }

        .doc a:hover,
        .doc a:focus-visible {
            color: var(--fg);
            outline: none;
        }

        .doc a:visited {
            color: #afd7af;
        }

        .doc a code {
            text-decoration: underline;
        }

        .doc img {
            max-width: 100%;
            height: auto;
            border: 1px solid #202020;
            border-radius: 4px;
        }

        .doc table {
            display: block;
            max-width: 100%;
            overflow-x: auto;
            border-collapse: collapse;
        }

        .repo-meta {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin: 14px 0 18px;
        }

        .repo-meta div {
            border: 1px solid #202020;
            border-radius: 4px;
            background: #060606;
            padding: 9px;
        }

        .repo-meta span {
            display: block;
            color: var(--dim);
            font-size: .78rem;
        }

        .repo-meta strong {
            color: var(--fg);
            font-weight: 400;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 640px) {
            html,
            body {
                font-size: 14px;
            }

            .topbar {
                align-items: flex-start;
                flex-direction: column;
                gap: 6px;
                padding: 8px 10px;
            }

            .topbar-links {
                justify-content: flex-start;
                width: 100%;
            }

            .topbar-links a {
                padding: 0 7px;
            }

            .workspace,
            .workspace.reader-open {
                grid-template-columns: minmax(0, 1fr);
                gap: 10px;
                padding: 10px;
            }

            .workspace {
                grid-template-rows: minmax(0, 1fr) minmax(0, 0fr);
            }

            .workspace.reader-open {
                grid-template-rows: minmax(42svh, 1fr) minmax(0, 58svh);
            }

            .terminal-frame,
            .workspace.reader-open .terminal-frame {
                width: 100%;
                justify-self: stretch;
            }

            #terminal {
                padding: 9px 10px;
            }

            .reader {
                transform: translateY(16px);
            }

            .help-command {
                display: block;
                min-width: 0;
            }

            .help-desc {
                display: block;
                padding-left: 2ch;
            }

            .reader-body {
                padding: 14px 12px 22px;
            }

            .repo-meta {
                grid-template-columns: 1fr;
            }

            .reader-head {
                grid-template-columns: minmax(0, 1fr) auto auto;
            }
        }
    </style>
</head>

<body>
    <header class="topbar" aria-label="site navigation">
        <div class="topbar-status" id="topbar-status"></div>
        <nav class="topbar-links" id="topbar-links"></nav>
    </header>
    <div class="workspace" id="workspace">
        <section class="terminal-frame" aria-label="terminal window">
            <div class="window-bar" aria-hidden="true">
                <span class="window-dot"></span>
                <span class="window-title" id="terminal-title">guest@luliang.online:~</span>
            </div>
            <main id="terminal" role="application" aria-label="shell" tabindex="0"></main>
        </section>
        <aside class="reader" id="reader" aria-label="content reader" aria-hidden="true">
            <div class="reader-inner">
                <div class="window-bar" aria-hidden="true">
                    <span class="window-dot"></span>
                    <span class="window-title">reader</span>
                </div>
                <header class="reader-head">
                    <div class="reader-title" id="reader-title">reader</div>
                    <a class="reader-link" id="reader-link" href="#" target="_blank" rel="noopener noreferrer">source</a>
                    <button class="reader-close" id="reader-close" type="button">close</button>
                </header>
                <article class="reader-body" id="reader-body">
                    <div class="reader-loading">reader idle</div>
                </article>
            </div>
        </aside>
    </div>
    <div id="aria-live" class="sr-only" aria-live="polite"></div>

    <script>
        const workspace = document.getElementById("workspace");
        const terminal = document.getElementById("terminal");
        const reader = document.getElementById("reader");
        const readerTitle = document.getElementById("reader-title");
        const readerLink = document.getElementById("reader-link");
        const readerBody = document.getElementById("reader-body");
        const readerClose = document.getElementById("reader-close");
        const topbarLinks = document.getElementById("topbar-links");
        const topbarStatus = document.getElementById("topbar-status");
        const terminalTitle = document.getElementById("terminal-title");
        const ariaLive = document.getElementById("aria-live");
        const commandInput = document.createElement("input");
        const inputMirror = document.createElement("span");
        inputMirror.className = "input-mirror";
        commandInput.className = "terminal-input";
        commandInput.type = "text";
        commandInput.autocomplete = "off";
        commandInput.autocapitalize = "off";
        commandInput.spellcheck = false;
        commandInput.setAttribute("aria-label", "shell command");

        const projectUrl = "https://luliang.online/";
        const siteLinks = [
            { key: "home", label: "Home", href: projectUrl, description: "本项目网址" },
            { key: "github", label: "GitHub", href: "https://github.com/Luyoung0001", description: "代码与项目" },
            { key: "blog", label: "Blog", href: "https://blog.luliang.website/", description: "博客文章" },
            { key: "thoughts", label: "Thoughts", href: "https://thoughts.luliang.online/", description: "随笔与想法" },
            { key: "bilibili", label: "Bilibili", href: "https://space.bilibili.com/19872805", description: "视频频道" },
            { key: "email", label: "Email", href: "mailto:791975457@qq.com", description: "联系邮箱" },
            { key: "piccut", label: "PicCut", href: "https://piccut.luliang.online/", description: "图片简单剪辑" },
            { key: "invest", label: "Invest", href: "https://invest.luliang.online/", description: "黄金、比特币等行情多空判断" },
            { key: "skills", label: "Skills", href: "https://skills.luliang.online/", description: "技能与工具" },
            { key: "smartchat", label: "SmartChat", href: "https://smartchat.site/", description: "智能聊天站点" },
            { key: "ai", label: "AI", href: "https://luyoungai.asia/", description: "AI 中转站" },
            { key: "xuptarch", label: "XUPTArch", href: "https://xuptarch.com/", description: "硬件学习网站" },
            { key: "rsimu", label: "RSimu", href: "https://rsimu.xuptarch.com/", description: "RISC-V 模拟器" }
        ];
        const links = Object.fromEntries(siteLinks.map(site => [site.key, site.href]));
        const shellReadme = [
            "Luyoung shell",
            "",
            "目标: 简洁操作。用接近真实 shell 的方式浏览文章、项目、搜索结果和站点入口。",
            `项目网址: ${projectUrl}`,
            "",
            "核心功能:",
            "  posts / open post <id>       列出并打开博客文章",
            "  repos / open repo <id>       列出并打开 GitHub 仓库",
            "  github search <q>            搜索 GitHub 仓库",
            "  google <q> / bing <q>        搜索网页并用编号打开结果",
            "  ls links / cat links/<name>  查看站点入口",
            "",
            "站点:",
            ...siteLinks.map(site => `  ${site.key.padEnd(9, " ")} ${site.href}  - ${site.description}`)
        ].join("\n");

        topbarLinks.innerHTML = siteLinks.map(site => (
            `<a href="${escapeHtml(site.href)}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(site.description)}">${escapeHtml(site.label)}</a>`
        )).join("");

        const PAGE_SIZE = 10;
        const BLOG_ARCHIVES_URL = `${links.blog}archives/`;
        const GITHUB_REPOS_API = "https://api.github.com/users/Luyoung0001/repos";
        const GITHUB_SEARCH_API = "https://api.github.com/search/repositories";
        const JINA_READER_BASE = "https://r.jina.ai/http://";

        const blogPosts = [
            {
                id: "la",
                title: "LA 框架的使用",
                date: "2026-04-12",
                url: "https://blog.luliang.website/2026/04/12/LA%20%E6%A1%86%E6%9E%B6%E7%9A%84%E4%BD%BF%E7%94%A8/"
            },
            {
                id: "nes",
                title: "毕设18：硬件加速 NES",
                date: "2026-04-16",
                url: "https://blog.luliang.website/2026/04/16/%E6%AF%95%E8%AE%BE18%EF%BC%9A%E7%A1%AC%E4%BB%B6%E5%8A%A0%E9%80%9FNES/"
            },
            {
                id: "jit-nes",
                title: "毕设16：JIT 跑 NES",
                date: "2026-01-31",
                url: "https://blog.luliang.website/2026/01/31/%E6%AF%95%E8%AE%BE16%EF%BC%9AJIT%E8%B7%91NES/"
            },
            {
                id: "qemu",
                title: "毕设17：利用 qemu 做快速仿真",
                date: "2026-01-30",
                url: "https://blog.luliang.website/2026/01/30/%E6%AF%95%E8%AE%BE17%EF%BC%9Aqemu%20%E5%8A%A0%E5%BF%AB%E4%BB%BF%E7%9C%9F%E9%80%9F%E5%BA%A6/"
            }
        ];

        const repos = [
            { id: "cpu", name: "Loongarch_1", owner: "Luyoung0001" },
            { id: "debugger", name: "mydebugger", owner: "Luyoung0001" },
            { id: "trans-api", name: "trans_api", owner: "Luyoung0001" },
            { id: "translator", name: "translate_all", owner: "Luyoung0001" },
            { id: "cpp", name: "cpp_design", owner: "Luyoung0001" }
        ];

        const dataState = {
            postsLoaded: false,
            postsLoading: null,
            reposLoaded: false,
            reposLoading: null,
            githubResults: [],
            webResults: [],
            webProvider: localStorage.getItem("webSearchProvider") || "google"
        };

        const files = {
            "/home/guest": {
                type: "dir",
                entries: {
                    "README": {
                        type: "file",
                        mode: "-rw-r--r--",
                        size: shellReadme.length,
                        content: shellReadme
                    },
                    "links": { type: "dir", mode: "drwxr-xr-x", size: 160 }
                }
            },
            "/home/guest/links": {
                type: "dir",
                entries: Object.fromEntries(Object.entries(links).map(([name, href]) => [
                    name,
                    { type: "file", mode: "-rw-r--r--", size: href.length, content: href }
                ]))
            }
        };

        const state = {
            user: "guest",
            host: "luliang.online",
            cwd: "/home/guest",
            history: JSON.parse(localStorage.getItem("history") || "[]").slice(-100),
            historyIndex: -1,
            input: null,
            promptLine: null,
            readerOpen: false,
            running: false,
            pager: null,
            pagerArmed: false
        };

        const commands = [
            "help", "clear", "pwd", "ls", "cd", "cat", "echo", "printf", "date",
            "whoami", "hostname", "uname", "id", "history", "env", "posts", "repos", "gitrepo",
            "github", "web", "google", "bing", "being", "next", "prev", "open", "close", "xdg-open", "exit"
        ];

        const welcomeLines = [
            `<span class="hint">type <span class="kbd">help</span> and press <span class="kbd">Enter</span>. try <span class="kbd">posts</span>, <span class="kbd">repos</span>, <span class="kbd">open post 0</span>.</span>`
        ];

        function escapeHtml(value) {
            return String(value ?? "").replace(/[&<>"]/g, char => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                "\"": "&quot;"
            }[char]));
        }

        function stripHtml(value) {
            const div = document.createElement("div");
            div.innerHTML = value;
            return div.textContent || "";
        }

        function promptHtml() {
            const home = "/home/guest";
            const path = state.cwd === home ? "~" : state.cwd.replace(`${home}/`, "~/");
            return `<span class="prompt">${state.user}@${state.host}</span>:<span class="path">${escapeHtml(path)}</span>$ `;
        }

        function appendLine(html = "") {
            const line = document.createElement("div");
            line.className = "line";
            line.innerHTML = html;
            terminal.appendChild(line);
            ariaLive.textContent = stripHtml(html);
            terminal.scrollTop = terminal.scrollHeight;
            return line;
        }

        function appendText(text = "") {
            for (const line of String(text).split("\n")) {
                appendLine(escapeHtml(line));
            }
        }

        function formatBeijingTime(date = new Date()) {
            return new Intl.DateTimeFormat("en-US", {
                timeZone: "Asia/Shanghai",
                weekday: "short",
                month: "short",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit",
                hour12: false,
                timeZoneName: "short"
            }).format(date).replace(/,/g, "");
        }

        function appendHelp(rows) {
            appendLine("GNU bash, version 5.2.0(compatible)");
            appendLine("");
            appendLine(`<span class="dim">These shell commands are available:</span>`);
            for (const [command, description] of rows) {
                appendLine(`  <span class="help-command">${highlightCommandLine(command)}</span><span class="help-desc">${escapeHtml(description)}</span>`);
            }
        }

        function setReaderLoading(title, url) {
            state.readerOpen = true;
            workspace.classList.add("reader-open");
            reader.setAttribute("aria-hidden", "false");
            readerTitle.textContent = title;
            readerLink.href = url || "#";
            readerBody.innerHTML = `<div class="reader-loading">fetching ${escapeHtml(title)} ...</div>`;
            terminal.scrollTop = terminal.scrollHeight;
        }

        function closeReader() {
            state.readerOpen = false;
            workspace.classList.remove("reader-open");
            reader.setAttribute("aria-hidden", "true");
            setTimeout(() => {
                if (!state.readerOpen) {
                    readerTitle.textContent = "reader";
                    readerLink.href = "#";
                    readerBody.innerHTML = `<div class="reader-loading">reader idle</div>`;
                }
            }, 430);
            focusInput();
        }

        function renderReader(title, url, html) {
            readerTitle.textContent = title;
            readerLink.href = url;
            readerBody.innerHTML = html;
            readerBody.scrollTop = 0;
        }

        function showOops(message, examples = []) {

            setReaderLoading("Oops", "#");
            readerTitle.textContent = "Oops";

            readerBody.innerHTML = `
                <section class="doc">

        function newPrompt() {
            const line = appendLine(`${promptHtml()}<span class="input-slot"></span>`);
            const slot = line.querySelector(".input-slot");
            state.promptLine = line;
            state.input = commandInput;
            commandInput.value = "";
            updateInputMirror();
            slot.appendChild(inputMirror);
            slot.appendChild(commandInput);
            focusInput();
        }

        function freezePrompt(command) {
            state.promptLine.innerHTML = `${promptHtml()}${highlightCommandLine(command)}`;
            state.input = null;
            state.promptLine = null;
        }

        function focusInput() {
            if (!state.input) return;
            commandInput.focus({ preventScroll: true });
            commandInput.setSelectionRange(commandInput.value.length, commandInput.value.length);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function updateInputMirror() {
            inputMirror.innerHTML = highlightCommandLine(commandInput.value);
        }

        function setLoginStatus() {
            const loginTime = formatBeijingTime();
            const prompt = `${state.user}@${state.host}:~$`;
            topbarStatus.innerHTML = `<strong>${escapeHtml(prompt)}</strong> Last login: ${escapeHtml(loginTime)}`;
            terminalTitle.textContent = `${state.user}@${state.host}:~`;
            return loginTime;
        }

        function saveHistory() {
            state.history = state.history.slice(-100);
            localStorage.setItem("history", JSON.stringify(state.history));
        }

        function parse(input) {
            const tokens = [];
            let token = "";
            let quote = "";
            let escaped = false;

            for (const char of input) {
                if (escaped) {
                    token += char;
                    escaped = false;
                    continue;
                }
                if (char === "\\") {
                    escaped = true;
                    continue;
                }
                if ((char === "\"" || char === "'") && !quote) {
                    quote = char;
                    continue;
                }
                if (char === quote) {
                    quote = "";
                    continue;
                }
                if (/\s/.test(char) && !quote) {
                    if (token) tokens.push(token);
                    token = "";
                    continue;
                }
                token += char;
            }

            if (token) tokens.push(token);
            return { tokens, quoteOpen: Boolean(quote) };
        }

        function commandTokenClass(token, index, tokens) {
            if (index === 0 && commands.includes(token)) return "cmd-command";
            if (tokens[index - 1] === "/" && commands.includes(token)) return "cmd-command";
            if (/^https?:\/\//i.test(token) || /^mailto:/i.test(token)) return "cmd-link";
            if (/^-{1,2}[\w-]+$/.test(token)) return "cmd-flag";
            if (/^\d+$/.test(token)) return "cmd-number";
            if (links[token]) return "cmd-link";
            if (/^<[^>]+>$/.test(token) || /^\[[^\]]+]$/.test(token)) return "cmd-number";
            if (index === 1 && ["github", "web"].includes(tokens[0])) return "cmd-action";
            return "";
        }

        function highlightCommandLine(commandLine) {
            const parsed = parse(commandLine);
            if (!parsed.tokens.length) return escapeHtml(commandLine);
            let cursor = 0;
            return parsed.tokens.map((token, index) => {
                const position = commandLine.indexOf(token, cursor);
                const prefix = position > cursor ? escapeHtml(commandLine.slice(cursor, position)) : "";
                cursor = position + token.length;
                const cls = commandTokenClass(token, index, parsed.tokens);
                const html = cls ? `<span class="${cls}">${escapeHtml(token)}</span>` : escapeHtml(token);
                return `${prefix}${html}`;
            }).join("") + escapeHtml(commandLine.slice(cursor));
        }

        function resolvePath(path = ".") {
            if (path === "~") return "/home/guest";
            if (path.startsWith("~/")) return `/home/guest/${path.slice(2)}`;
            if (path.startsWith("/")) return normalizePath(path);
            return normalizePath(`${state.cwd}/${path}`);
        }

        function normalizePath(path) {
            const parts = [];
            for (const part of path.split("/")) {
                if (!part || part === ".") continue;
                if (part === "..") {
                    parts.pop();
                    continue;
                }
                parts.push(part);
            }
            return `/${parts.join("/")}`;
        }

        function parentPath(path) {
            const parts = path.split("/").filter(Boolean);
            parts.pop();
            return `/${parts.join("/")}`;
        }

        function baseName(path) {
            return path.split("/").filter(Boolean).at(-1) || "/";
        }

        function stat(path) {
            if (files[path]) return files[path];
            const parent = files[parentPath(path)];
            return parent?.entries?.[baseName(path)] || null;
        }

        function fileContent(path) {
            const node = stat(path);
            return node?.type === "file" ? node.content : null;
        }

        function listDir(path, long = false, all = false) {
            const dir = files[path];
            if (!dir || dir.type !== "dir") return null;

            const entries = Object.entries(dir.entries);
            const names = all ? [[".", { type: "dir", mode: "drwxr-xr-x", size: 96 }], ["..", { type: "dir", mode: "drwxr-xr-x", size: 96 }], ...entries] : entries;

            if (!long) {
                return names.map(([name, node]) => {
                    const cls = node.type === "dir" ? "dir" : "";
                    return cls ? `<span class="${cls}">${escapeHtml(name)}</span>` : escapeHtml(name);
                }).join("  ");
            }

            const total = names.length * 4;
            const rows = names.map(([name, node]) => {
                const mode = node.mode || (node.type === "dir" ? "drwxr-xr-x" : "-rw-r--r--");
                const size = String(node.size || 96).padStart(5, " ");
                const date = "Jun 16 16:00";
                const label = node.type === "dir" ? `<span class="dir">${escapeHtml(name)}</span>` : escapeHtml(name);
                return `${mode} 1 guest guest ${size} ${date} ${label}`;
            });
            return [`total ${total}`, ...rows].join("\n");
        }

        function uniqueBy(items, keyFn) {
            const seen = new Set();
            return items.filter(item => {
                const key = keyFn(item);
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
        }

        function ensureUniqueIds(items) {
            const seen = new Map();
            return items.map(item => {
                const base = item.id || "item";
                const count = (seen.get(base) || 0) + 1;
                seen.set(base, count);
                return count === 1 ? item : { ...item, id: compactId(`${base}-${count}`, 34) };
            });
        }

        function numberedPosts(items) {
            return items.map((item, index) => ({
                ...item,
                id: String(index),
                aliases: uniqueBy([item.id, ...(item.aliases || [])].filter(Boolean), alias => alias)
            }));
        }

        function renumberPosts(items) {
            const numbered = numberedPosts(items);
            blogPosts.splice(0, blogPosts.length, ...numbered);
            return blogPosts;
        }

        function numberedRepos(items) {
            return items.map((item, index) => ({
                ...item,
                id: String(index),
                aliases: uniqueBy([item.id, ...(item.aliases || [])].filter(Boolean), alias => alias)
            }));
        }

        function renumberRepos(items) {
            const numbered = numberedRepos(items);
            repos.splice(0, repos.length, ...numbered);
            return repos;
        }

        function slugify(value, fallback) {
            const ascii = String(value || "")
                .normalize("NFKD")
                .replace(/[\u0300-\u036f]/g, "")
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, "-")
                .replace(/^-+|-+$/g, "");
            return ascii || fallback;
        }

        function compactId(value, maxLength = 30) {
            const tokens = String(value || "").split("-").filter(Boolean);
            const kept = [];

            for (const token of tokens) {
                const next = [...kept, token].join("-");
                if (next.length > maxLength && kept.length) break;
                kept.push(token);
            }

            return (kept.join("-") || String(value || "").slice(0, maxLength)).replace(/-+$/g, "");
        }

        function safeDecode(value) {
            try {
                return decodeURIComponent(value);
            } catch {
                return String(value || "");
            }
        }

        function normalizeTitle(value) {
            return String(value || "")
                .replace(/[（]/g, "(")
                .replace(/[）]/g, ")")
                .replace(/[：]/g, ":")
                .replace(/\s+/g, " ")
                .trim();
        }

        function thesisTopicSlug(value) {
            const text = normalizeTitle(value);
            if (/JIT/i.test(text) && /NES/i.test(text)) return "jit-nes";
            if (/JIT/i.test(text)) return "jit";
            if (/qemu/i.test(text)) return "qemu";
            if (/NES/i.test(text) && /mario/i.test(text)) return "nes-mario";
            if (/shell|命令/.test(text)) return "shell";
            if (/terminal/i.test(text)) return "terminal";
            if (/HDMI/i.test(text) && /buffer/i.test(text)) return "hdmi-buffer";
            if (/时间片|协作式|多任务/.test(text)) return "timeslice-os";
            if (/ps2|键盘/i.test(text)) return "ps2-keyboard";
            if (/minicom/i.test(text)) return "minicom";
            if (/uart/i.test(text)) return "uart-test";
            if (/ddr3/i.test(text) && /sd\s*卡/i.test(text)) return "ddr3-sd";
            if (/mylibc/i.test(text)) return "mylibc";
            if (/HDMI[_\s-]*test/i.test(text)) return "hdmi-test";
            if (/xOS/i.test(text)) return "xos";
            if (/hello\s*world/i.test(text)) return "hello-world";
            if (/地址空间/.test(text)) return "addr-space";
            return semanticSlug(text, "");
        }

        function semanticSlug(value, fallback) {
            const replacements = [
                ["硬件加速", "hardware-accel"],
                ["快速仿真", "fast-sim"],
                ["内联汇编", "inline-asm"],
                ["地址空间", "addr-space"],
                ["时间片", "timeslice"],
                ["协作式", "coop"],
                ["多任务", "multitask"],
                ["模拟器", "emulator"],
                ["注意点", "note"],
                ["适配", "port"],
                ["仿真", "sim"],
                ["命令", "shell"],
                ["设计", "design"],
                ["键盘", "keyboard"],
                ["测试", "test"],
                ["划分", "layout"],
                ["系统", "os"],
                ["技术", ""],
                ["利用", ""],
                ["基于", ""],
                ["更多", ""],
                ["一个", ""],
                ["的", ""],
                ["和", " "],
                ["与", " "]
            ];
            let text = normalizeTitle(value);
            for (const [from, to] of replacements) {
                text = text.replaceAll(from, ` ${to} `);
            }
            return compactId(slugify(text, fallback), 30);
        }

        function postAlias(title, url) {
            const decoded = safeDecode(url);
            if (/LA\s*框架/i.test(title) || /LA\s*框架/i.test(decoded)) return "la";
            if (/硬件加速\s*NES/i.test(title) || /硬件加速NES/i.test(decoded)) return "nes";
            if (/JIT\s*跑\s*NES/i.test(title) || /JIT.*NES/i.test(decoded)) return "jit-nes";
            if (/qemu/i.test(title) || /qemu/i.test(decoded)) return "qemu";
            return "";
        }

        function repoAlias(name) {
            const aliases = {
                Loongarch_1: "cpu",
                mydebugger: "debugger",
                trans_api: "trans-api",
                translate_all: "translator",
                cpp_design: "cpp"
            };
            return aliases[name] || "";
        }

        function mapGitHubRepo(repo) {
            const alias = repoAlias(repo.name) || slugify(repo.name, `repo-${repo.id}`);
            const owner = repo.owner?.login || "unknown";
            return {
                id: alias,
                aliases: uniqueBy([alias, repo.name, `${owner}/${repo.name}`].filter(Boolean), item => item),
                name: repo.name,
                owner,
                description: repo.description || "",
                url: repo.html_url,
                language: repo.language || "mixed",
                stars: repo.stargazers_count || 0,
                updatedAt: repo.updated_at || ""
            };
        }

        async function fetchDocument(url) {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const html = await response.text();
            return new DOMParser().parseFromString(html, "text/html");
        }

        function archivePageUrl(page) {
            return page <= 1 ? BLOG_ARCHIVES_URL : `${BLOG_ARCHIVES_URL}page/${page}/`;
        }

        function archivePageCount(doc) {
            const numbers = [...doc.querySelectorAll(".page-number")]
                .map(node => Number(node.textContent.trim()))
                .filter(Number.isFinite);
            return Math.max(1, ...numbers);
        }

        function fallbackPostTitle(url) {
            const segment = safeDecode(new URL(url).pathname.split("/").filter(Boolean).at(-1) || "post");
            return segment.replace(/[-_]+/g, " ").trim() || "untitled post";
        }

        function makePostId(title, url, date, index) {
            const normalized = normalizeTitle(title || fallbackPostTitle(url));
            const alias = postAlias(normalized, url);
            if (alias) return alias;

            const thesis = normalized.match(/^毕设\s*\(?(\d+)\)?\s*:\s*(.+)$/);
            if (thesis) {
                const topic = thesisTopicSlug(thesis[2]);
                return compactId(`thesis-${Number(thesis[1])}${topic ? `-${topic}` : ""}`, 30);
            }

            if (/loongarch/i.test(normalized) && /内联汇编/.test(normalized)) return "loongarch-inline-asm";

            const slug = semanticSlug(normalized, "");
            return slug || `post-${date.replace(/-/g, "")}-${index + 1}`;
        }

        function extractArchivePosts(doc, pageUrl) {
            return [...doc.querySelectorAll("a.list-group-item[href]")]
                .map((link, index) => {
                    const url = new URL(link.getAttribute("href"), pageUrl).href;
                    const match = url.match(/\/(20\d{2})\/(\d{2})\/(\d{2})\//);
                    if (!match) return null;

                    const titleNode = link.querySelector(".list-group-item-title");
                    const title = (titleNode?.textContent || "").replace(/\s+/g, " ").trim() || fallbackPostTitle(url);
                    const date = `${match[1]}-${match[2]}-${match[3]}`;
                    const alias = makePostId(title, url, date, index);
                    return { id: alias, aliases: [alias], title, date, url };
                })
                .filter(Boolean);
        }

        async function loadAllPosts() {
            if (dataState.postsLoaded) return blogPosts;
            if (dataState.postsLoading) return dataState.postsLoading;

            dataState.postsLoading = (async () => {
                const firstDoc = await fetchDocument(BLOG_ARCHIVES_URL);
                const pageCount = Math.min(archivePageCount(firstDoc), 60);
                const restPages = await Promise.all(
                    Array.from({ length: Math.max(0, pageCount - 1) }, (_, index) => fetchDocument(archivePageUrl(index + 2)))
                );
                const pages = [firstDoc, ...restPages];

                const fetched = pages.flatMap((doc, index) => extractArchivePosts(doc, archivePageUrl(index + 1)));
                renumberPosts(ensureUniqueIds(uniqueBy([...fetched, ...blogPosts], post => post.url)));
                dataState.postsLoaded = true;
                return blogPosts;
            })().finally(() => {
                dataState.postsLoading = null;
            });

            return dataState.postsLoading;
        }

        async function loadAllRepos() {
            if (dataState.reposLoaded) return repos;
            if (dataState.reposLoading) return dataState.reposLoading;

            dataState.reposLoading = (async () => {
                const fetched = [];
                for (let page = 1; page <= 10; page += 1) {
                    const response = await fetch(`${GITHUB_REPOS_API}?per_page=100&sort=updated&page=${page}`);
                    if (!response.ok) throw new Error(`GitHub HTTP ${response.status}`);
                    const payload = await response.json();
                    fetched.push(...payload);
                    if (payload.length < 100) break;
                }

                const mapped = fetched.map(mapGitHubRepo);
                const merged = uniqueBy([...mapped, ...repos], repo => `${repo.owner}/${repo.name}`);
                renumberRepos(merged);
                dataState.reposLoaded = true;
                return repos;
            })().finally(() => {
                dataState.reposLoading = null;
            });

            return dataState.reposLoading;
        }

        async function searchGitHubRepos(query) {
            const response = await fetch(`${GITHUB_SEARCH_API}?q=${encodeURIComponent(query)}&sort=stars&order=desc&per_page=50`);
            if (!response.ok) throw new Error(`GitHub search HTTP ${response.status}`);
            const payload = await response.json();
            dataState.githubResults = numberedRepos((payload.items || []).map(mapGitHubRepo));
            return dataState.githubResults;
        }

        function numberWebResults(items) {
            return items.map((item, index) => ({
                id: String(index),
                title: item.title || item.url || "untitled",
                url: item.url,
                snippet: item.snippet || item.description || ""
            })).filter(item => item.url);
        }

        async function fetchMarkdownSearch(url) {
            const response = await fetch(`${JINA_READER_BASE}${url}`);
            if (!response.ok) throw new Error(`web search HTTP ${response.status}`);
            return response.text();
        }

        function stripMarkdown(value) {
            return String(value || "")
                .replace(/!\[[^\]]*]\([^)]+\)/g, "")
                .replace(/\[([^\]]+)]\((https?:\/\/[^)]+)\)/g, "$1")
                .replace(/\*\*([^*]+)\*\*/g, "$1")
                .replace(/`([^`]+)`/g, "$1")
                .replace(/\s+/g, " ")
                .trim();
        }

        function decodeBingUrl(value) {
            const encoded = new URL(value).searchParams.get("u");
            if (!encoded) return value;
            const payload = encoded.startsWith("a1") ? encoded.slice(2) : encoded;
            try {
                const normalized = payload.replace(/-/g, "+").replace(/_/g, "/");
                const padded = normalized.padEnd(Math.ceil(normalized.length / 4) * 4, "=");
                const decoded = decodeBase64(padded);
                return /^https?:\/\//i.test(decoded) ? decoded : value;
            } catch {
                return value;
            }
        }

        function resolveSearchRedirect(value) {
            try {
                const url = new URL(value);
                if (url.hostname.includes("duckduckgo.com") && url.searchParams.get("uddg")) {
                    return url.searchParams.get("uddg");
                }
                if (url.hostname.includes("bing.com") && url.pathname.startsWith("/ck/")) {
                    return decodeBingUrl(value);
                }
                return value;
            } catch {
                return value;
            }
        }

        function isSearchChromeUrl(value) {
            try {
                const url = new URL(value);
                const host = url.hostname.replace(/^www\./, "");
                return [
                    "google.com",
                    "bing.com",
                    "duckduckgo.com",
                    "support.google.com",
                    "accounts.google.com",
                    "maps.google.com"
                ].some(domain => host === domain || host.endsWith(`.${domain}`));
            } catch {
                return true;
            }
        }

        function resultFingerprint(item) {
            try {
                const url = new URL(item.url);
                url.hash = "";
                return url.href.replace(/\/$/, "");
            } catch {
                return item.url;
            }
        }

        function cleanSearchSnippet(value) {
            return stripMarkdown(value)
                .replace(/URL Source:.+$/i, "")
                .replace(/Markdown Content:.+$/i, "")
                .replace(/\bCached\b|\bSimilar\b/g, "")
                .trim();
        }

        function parseDuckDuckGoMarkdown(markdown) {
            const results = [];
            const pattern = /^\s*(\d+)\.\[([^\]]+)]\((https?:\/\/[^)]+)\)\s*\n([\s\S]*?)(?=\n\s*\d+\.\[|\n\s*\[Feedback]|\n\s*Title:|$)/gm;
            let match;
            while ((match = pattern.exec(markdown))) {
                const title = stripMarkdown(match[2]);
                const url = resolveSearchRedirect(match[3]);
                const snippet = cleanSearchSnippet(match[4].split("\n").filter(line => !/^https?:\/\//i.test(line.trim())).join(" "));
                if (title && /^https?:\/\//i.test(url) && !isSearchChromeUrl(url)) {
                    results.push({ title, url, snippet });
                }
            }
            return results;
        }

        function parseBingMarkdown(markdown) {
            const results = [];
            const pattern = /^\s*(\d+)\.\s+## \[([^\]]+)]\((https?:\/\/[^)]+)\)\s*\n+([\s\S]*?)(?=\n\s*\d+\.\s+## \[|$)/gm;
            let match;
            while ((match = pattern.exec(markdown))) {
                const title = stripMarkdown(match[2]);
                const url = resolveSearchRedirect(match[3]);
                const snippet = cleanSearchSnippet(match[4]);
                if (title && /^https?:\/\//i.test(url) && !isSearchChromeUrl(url)) {
                    results.push({ title, url, snippet });
                }
            }
            return results;
        }

        function parseGoogleMarkdown(markdown) {
            const results = [];
            const pattern = /^\s*\*\s+\[]\((https?:\/\/[^)]+)\)([^\n]+?)(?=\s{2,}!\[|\n|\r|$)/gm;
            let match;
            while ((match = pattern.exec(markdown))) {
                const title = stripMarkdown(match[2]);
                const url = resolveSearchRedirect(match[1]);
                if (title && /^https?:\/\//i.test(url) && !isSearchChromeUrl(url)) {
                    results.push({ title, url, snippet: "" });
                }
            }
            return results;
        }

        function parseMarkdownSearchResults(markdown, source) {
            const parsers = source === "bing"
                ? [parseBingMarkdown, parseDuckDuckGoMarkdown, parseGoogleMarkdown]
                : [parseGoogleMarkdown, parseDuckDuckGoMarkdown, parseBingMarkdown];
            const merged = uniqueBy(parsers.flatMap(parse => parse(markdown)), resultFingerprint);
            return numberWebResults(merged.slice(0, 50));
        }

        async function searchWithMarkdownProvider(url, source, fallback) {
            const markdown = await fetchMarkdownSearch(url);
            const results = parseMarkdownSearchResults(markdown, source);
            if (results.length) return results;
            return numberWebResults([fallback]);
        }

        const webSearchProviders = {
            google: {
                async search(query) {
                    return searchWithMarkdownProvider(
                        `https://lite.duckduckgo.com/lite/?q=${encodeURIComponent(query)}`,
                        "google",
                        {
                            title: `Google search page: ${query}`,
                            url: `https://www.google.com/search?q=${encodeURIComponent(query)}`,
                            snippet: "Search parser returned no individual results, so this is the fallback search page."
                        }
                    );
                }
            },
            bing: {
                async search(query) {
                    return searchWithMarkdownProvider(
                        `https://www.bing.com/search?q=${encodeURIComponent(query)}`,
                        "bing",
                        {
                            title: `Bing search page: ${query}`,
                            url: `https://www.bing.com/search?q=${encodeURIComponent(query)}`,
                            snippet: "Search parser returned no individual results, so this is the fallback search page."
                        }
                    );
                }
            },
            being: {
                async search(query) {
                    return webSearchProviders.bing.search(query);
                }
            },
            "custom-json": {
                async search(query) {
                    const endpoint = localStorage.getItem("webSearchEndpoint") || "";
                    if (!endpoint) throw new Error("Missing webSearchEndpoint.");
                    const response = await fetch(endpoint.replace("{query}", encodeURIComponent(query)));
                    if (!response.ok) throw new Error(`web search HTTP ${response.status}`);
                    const payload = await response.json();
                    const rawItems = Array.isArray(payload) ? payload : (payload.items || payload.results || []);
                    return numberWebResults(rawItems.map(item => ({
                        title: item.title || item.name,
                        url: item.url || item.link,
                        snippet: item.snippet || item.description
                    })));
                }
            },
            "static-demo": {
                async search(query) {
                    return numberWebResults([
                        ...(await webSearchProviders.google.search(query)),
                        ...(await webSearchProviders.bing.search(query)),
                        {
                            title: `GitHub: ${query}`,
                            url: `https://github.com/search?q=${encodeURIComponent(query)}&type=repositories`,
                            snippet: "GitHub web search URL."
                        }
                    ]);
                }
            }
        };

        async function searchWeb(query) {
            const providerName = dataState.webProvider;
            const provider = webSearchProviders[providerName] || webSearchProviders.google;
            const results = await provider.search(query);
            dataState.webResults = numberWebResults(results);
            return dataState.webResults;
        }

        function postRow(post, idWidth = 18) {
            return `${post.id.padEnd(idWidth, " ")} ${post.date}  ${post.title}`;
        }

        function repoRow(repo, idWidth = 18) {
            const updated = repo.updatedAt ? repo.updatedAt.slice(0, 10) : "----------";
            const stars = String(repo.stars ?? 0).padStart(3, " ");
            return `${repo.id.padEnd(idWidth, " ")} ${stars}  ${updated}  ${repo.owner}/${repo.name}`;
        }

        function webRow(item, idWidth = 18) {
            return `${item.id.padEnd(idWidth, " ")} ${item.title}  ${item.url}`;
        }

        function renderPage(delta = 0) {
            if (!state.pager) return false;
            const maxPage = Math.max(0, Math.ceil(state.pager.items.length / PAGE_SIZE) - 1);
            const nextPage = Math.max(0, Math.min(maxPage, state.pager.page + delta));

            if (nextPage === state.pager.page && delta !== 0) {
                appendText(nextPage === maxPage ? "pager: already at last page" : "pager: already at first page");
                return true;
            }

            state.pager.page = nextPage;
            const start = nextPage * PAGE_SIZE;
            const pageItems = state.pager.items.slice(start, start + PAGE_SIZE);
            const pageLabel = `${nextPage + 1}/${maxPage + 1}`;
            const headerByType = {
                posts: `posts page ${pageLabel} (${state.pager.items.length} total) -- ↓ next, ↑ prev, open post <id>`,
                repos: `repos page ${pageLabel} (${state.pager.items.length} total) -- ↓ next, ↑ prev, open repo <id>`,
                "github-search": `github search page ${pageLabel} (${state.pager.items.length} total) -- ↓ next, ↑ prev, github open <id>`,
                "web-search": `web search page ${pageLabel} (${state.pager.items.length} total) -- ↓ next, ↑ prev, web open <id>`
            };
            const idWidth = Math.max(18, ...pageItems.map(item => item.id.length));
            const columnByType = {
                posts: `${"id".padEnd(idWidth, " ")} date        title`,
                repos: `${"id".padEnd(idWidth, " ")} ★    updated     repository`,
                "github-search": `${"id".padEnd(idWidth, " ")} ★    updated     repository`,
                "web-search": `${"id".padEnd(idWidth, " ")} title  url`
            };
            const rows = pageItems.map(item => {
                if (state.pager.type === "posts") return postRow(item, idWidth);
                if (state.pager.type === "web-search") return webRow(item, idWidth);
                return repoRow(item, idWidth);
            });
            appendText([headerByType[state.pager.type] || headerByType.repos, columnByType[state.pager.type] || columnByType.repos, ...rows].join("\n"));
            return true;
        }

        function setPager(type, items) {
            state.pager = { type, items, page: 0 };
            state.pagerArmed = true;
            renderPage();
        }

        const builtins = {

            ls(args) {
                const flags = args.filter(arg => arg.startsWith("-")).join("");
                const paths = args.filter(arg => !arg.startsWith("-"));
                const target = resolvePath(paths[0] || ".");
                const long = flags.includes("l");
                const all = flags.includes("a");
                const node = stat(target);

                if (!node) {
                    appendLine(`<span class="error">ls: cannot access '${escapeHtml(paths[0] || ".")}': No such file or directory</span>`);
                    return;
                }
                if (node.type === "file") {
                    appendText(baseName(target));
                    return;
                }
                appendLine(listDir(target, long, all));
            },
            cd(args) {
                const target = resolvePath(args[0] || "~");
                const node = stat(target);

                if (!node) {
                    appendLine(`<span class="error">bash: cd: ${escapeHtml(args[0] || "~")}: No such file or directory</span>`);
                    return;
                }
                if (node.type !== "dir") {
                    appendLine(`<span class="error">bash: cd: ${escapeHtml(args[0])}: Not a directory</span>`);
                    return;
                }
                state.cwd = target;
            },
            cat(args) {
                if (!args.length) return;

                for (const arg of args) {
                    const target = resolvePath(arg);
                    const node = stat(target);
                    if (!node) {
                        appendLine(`<span class="error">cat: ${escapeHtml(arg)}: No such file or directory</span>`);
                    } else if (node.type === "dir") {
                        appendLine(`<span class="error">cat: ${escapeHtml(arg)}: Is a directory</span>`);
                    } else {
                        appendText(fileContent(target));
                    }
                }
            },
            echo(args) {
                appendText(args.join(" "));

            printf(args) {
                appendText(args.join(" ").replace(/\\n/g, "\n"));

            date() {

            whoami() {

            hostname() {

            uname(args) {
