<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>shell</title>
    <meta name="description" content="A quiet shell-style personal page." />
    <meta name="theme-color" content="#000000" />
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='black'/%3E%3Cpath d='M14 38l8-8-8-8' fill='none' stroke='%23d7d7d7' stroke-width='5' stroke-linecap='square' stroke-linejoin='round'/%3E%3Cpath d='M30 44h20' stroke='%23d7d7d7' stroke-width='5' stroke-linecap='square'/%3E%3C/svg%3E" />
    <style>
        :root {
            color-scheme: dark;
            --bg: #000;
            --panel: #050505;
            --panel-2: #090909;
            --border: #1c1c1c;
            --fg: #d7d7d7;
            --dim: #808080;
            --blue: #5fafff;
            --green: #87d787;
            --red: #ff5f5f;
            --yellow: #d7af5f;
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: var(--mono);
            font-size: 15px;
            line-height: 1.38;
            letter-spacing: 0;
        }

        body {
            height: 100svh;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            overflow: hidden;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .topbar {
            min-height: 42px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 0 12px;
            border-bottom: 1px solid #1c1c1c;
            background: #050505;
        }

        .topbar-status {
            color: var(--dim);
            white-space: nowrap;
        }

        .topbar-status strong {
            color: var(--fg);
            font-weight: 400;
        }

        .topbar-links {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            flex-wrap: wrap;
        }

        .topbar-links a {
            min-height: 28px;
            display: inline-flex;
            align-items: center;
            border: 1px solid transparent;
            border-radius: 3px;
            padding: 0 9px;
            color: var(--fg);
        }

        .topbar-links a:hover,
        .topbar-links a:focus-visible {
            border-color: #303030;
            background: #101010;
            color: var(--green);
            outline: none;
        }

        .workspace {
            min-height: 0;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 0fr);
            gap: 0;
            overflow: hidden;
            transition: grid-template-columns 420ms cubic-bezier(.2, .8, .2, 1), gap 420ms cubic-bezier(.2, .8, .2, 1);
        }

        .workspace.reader-open {
            grid-template-columns: minmax(360px, .86fr) minmax(420px, 1.14fr);
            gap: 1px;
        }

        #terminal {
            min-width: 0;
            height: 100%;
            padding: 10px 12px;
            overflow: auto;
            outline: none;
            white-space: pre-wrap;
            word-break: break-word;
            cursor: text;
            transition: background-color 420ms ease, padding 420ms ease;
        }

        .workspace.reader-open #terminal {
            background: #020202;
        }

        .line {
            min-height: 1.38em;
        }

        .prompt {
            color: var(--green);
        }

        .path {
            color: var(--blue);
        }

        .error {
            color: var(--red);
        }

        .dim {
            color: var(--dim);
        }

        .dir {
            color: var(--blue);
            font-weight: 700;
        }

        .exe {
            color: var(--green);
            font-weight: 700;
        }

        .warn {
            color: var(--yellow);
        }

        .terminal-input {
            display: inline-block;
            width: min(74ch, calc(100% - 22ch));
            min-width: 2ch;
            border: 0;
            outline: 0;
            padding: 0;
            background: transparent;
            color: var(--fg);
            font: inherit;
            line-height: inherit;
            caret-color: var(--fg);
            vertical-align: baseline;
            appearance: none;
            border-radius: 0;
        }

        .terminal-input::placeholder {
            color: #505050;
        }

        .hint {
            color: var(--dim);
        }

        .kbd {
            color: var(--fg);
        }

        .reader {
            min-width: 0;
            height: 100%;
            border-left: 1px solid var(--border);
            background: linear-gradient(180deg, var(--panel-2), var(--panel));
            overflow: hidden;
            opacity: 0;
            transform: translateX(18px);
            pointer-events: none;
            transition: opacity 340ms ease, transform 420ms cubic-bezier(.2, .8, .2, 1);
        }

        .workspace.reader-open .reader {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .reader-inner {
            height: 100%;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
        }

        .reader-head {
            min-height: 42px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            align-items: center;
            gap: 8px;
            padding: 0 10px 0 12px;
            border-bottom: 1px solid var(--border);
            background: #030303;
        }

        .reader-title {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--fg);
        }

        .reader-link,
        .reader-close {
            min-height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid transparent;
            border-radius: 3px;
            background: transparent;
            color: var(--dim);
            font: inherit;
            padding: 0 8px;
            cursor: pointer;
        }

        .reader-link:hover,
        .reader-link:focus-visible,
        .reader-close:hover,
        .reader-close:focus-visible {
            border-color: #303030;
            color: var(--green);
            outline: none;
        }

        .reader-body {
            min-height: 0;
            overflow: auto;
            padding: 18px 20px 28px;
            color: #d0d0d0;
            white-space: normal;
            word-break: normal;
            overflow-wrap: anywhere;
        }

        .reader-loading {
            color: var(--dim);
            white-space: pre-wrap;
        }

        .doc {
            max-width: 860px;
            margin: 0 auto;
            overflow-wrap: anywhere;
        }

        .doc-kicker {
            margin: 0 0 10px;
            color: var(--green);
            font-size: .86rem;
        }

        .doc h1 {
            margin: 0 0 14px;
            color: #f2f2f2;
            font-size: clamp(1.45rem, 2.6vw, 2rem);
            line-height: 1.22;
            font-weight: 700;
        }

        .doc h2,
        .doc h3 {
            margin: 24px 0 10px;
            color: #eeeeee;
            line-height: 1.28;
        }

        .doc h2 {
            font-size: 1.22rem;
            border-bottom: 1px solid #202020;
            padding-bottom: 7px;
        }

        .doc h3 {
            font-size: 1.05rem;
        }

        .doc p,
        .doc li {
            line-height: 1.76;
            overflow-wrap: anywhere;
        }

        .doc p {
            margin: 0 0 13px;
        }

        .doc ul,
        .doc ol {
            padding-left: 1.4rem;
        }

        .doc code {
            border: 1px solid #242424;
            border-radius: 3px;
            background: #0c0c0c;
            color: var(--green);
            padding: 1px 4px;
        }

        .doc pre {
            overflow: auto;
            max-width: 100%;
            border: 1px solid #202020;
            border-radius: 5px;
            background: #050505;
            padding: 12px;
            line-height: 1.55;
        }

        .doc pre code {
            border: 0;
            background: transparent;
            padding: 0;
            color: #d7d7d7;
        }

        .doc blockquote {
            margin: 14px 0;
            border-left: 3px solid #303030;
            padding-left: 12px;
            color: #a8a8a8;
        }

        .doc img {
            max-width: 100%;
            height: auto;
            border: 1px solid #202020;
            border-radius: 4px;
        }

        .doc table {
            display: block;
            max-width: 100%;
            overflow-x: auto;
            border-collapse: collapse;
        }

        .repo-meta {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin: 14px 0 18px;
        }

        .repo-meta div {
            border: 1px solid #202020;
            border-radius: 4px;
            background: #060606;
            padding: 9px;
        }

        .repo-meta span {
            display: block;
            color: var(--dim);
            font-size: .78rem;
        }

        .repo-meta strong {
            color: var(--fg);
            font-weight: 400;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 640px) {
            html,
            body {
                font-size: 14px;
            }

            .topbar {
                align-items: flex-start;
                flex-direction: column;
                gap: 6px;
                padding: 8px 10px;
            }

            .topbar-links {
                justify-content: flex-start;
                width: 100%;
            }

            .topbar-links a {
                padding: 0 7px;
            }

            .workspace,
            .workspace.reader-open {
                grid-template-columns: minmax(0, 1fr);
                grid-template-rows: minmax(42svh, 1fr) minmax(0, 58svh);
                gap: 1px;
            }

            #terminal {
                padding: 9px 10px;
            }

            .reader {
                border-left: 0;
                border-top: 1px solid var(--border);
                transform: translateY(16px);
            }

            .reader-body {
                padding: 14px 12px 22px;
            }

            .repo-meta {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header class="topbar" aria-label="site navigation">
        <div class="topbar-status"><strong>guest@luyoung</strong>:~$</div>
        <nav class="topbar-links">
            <a href="https://github.com/Luyoung0001" target="_blank" rel="noopener noreferrer">GitHub</a>
            <a href="https://blog.luliang.website/" target="_blank" rel="noopener noreferrer">Blog</a>
            <a href="https://thoughts-519.pages.dev/" target="_blank" rel="noopener noreferrer">Thoughts</a>

            <a href="mailto:791975457@qq.com">Email</a>
        </nav>
    </header>
    <div class="workspace" id="workspace">
        <main id="terminal" role="application" aria-label="shell" tabindex="0"></main>
        <aside class="reader" id="reader" aria-label="content reader" aria-hidden="true">
            <div class="reader-inner">
                <header class="reader-head">
                    <div class="reader-title" id="reader-title">reader</div>
                    <a class="reader-link" id="reader-link" href="#" target="_blank" rel="noopener noreferrer">source</a>
                    <button class="reader-close" id="reader-close" type="button">close</button>
                </header>
                <article class="reader-body" id="reader-body">
                    <div class="reader-loading">reader idle</div>
                </article>
            </div>
        </aside>
    </div>
    <div id="aria-live" class="sr-only" aria-live="polite"></div>

    <script>
        const workspace = document.getElementById("workspace");
        const terminal = document.getElementById("terminal");
        const reader = document.getElementById("reader");
        const readerTitle = document.getElementById("reader-title");
        const readerLink = document.getElementById("reader-link");
        const readerBody = document.getElementById("reader-body");
        const readerClose = document.getElementById("reader-close");
        const ariaLive = document.getElementById("aria-live");
        const commandInput = document.createElement("input");
        commandInput.className = "terminal-input";
        commandInput.type = "text";
        commandInput.autocomplete = "off";
        commandInput.autocapitalize = "off";
        commandInput.spellcheck = false;
        commandInput.setAttribute("aria-label", "shell command");

        const links = {
            github: "https://github.com/Luyoung0001",
            blog: "https://blog.luliang.website/",
            thoughts: "https://thoughts-519.pages.dev/",
            bilibili: "https://space.bilibili.com/19872805",
            email: "mailto:791975457@qq.com"
        };

        const blogPosts = [
            {
                id: "la",
                title: "LA 框架的使用",
                date: "2026-04-12",
                url: "https://blog.luliang.website/2026/04/12/LA%20%E6%A1%86%E6%9E%B6%E7%9A%84%E4%BD%BF%E7%94%A8/"
            },
            {
                id: "nes",
                title: "毕设18：硬件加速 NES",
                date: "2026-04-16",
                url: "https://blog.luliang.website/2026/04/16/%E6%AF%95%E8%AE%BE18%EF%BC%9A%E7%A1%AC%E4%BB%B6%E5%8A%A0%E9%80%9FNES/"
            },
            {
                id: "jit-nes",
                title: "毕设16：JIT 跑 NES",
                date: "2026-01-31",
                url: "https://blog.luliang.website/2026/01/31/%E6%AF%95%E8%AE%BE16%EF%BC%9AJIT%E8%B7%91NES/"
            },
            {
                id: "qemu",
                title: "毕设17：利用 qemu 做快速仿真",
                date: "2026-01-30",
                url: "https://blog.luliang.website/2026/01/30/%E6%AF%95%E8%AE%BE17%EF%BC%9Aqemu%20%E5%8A%A0%E5%BF%AB%E4%BB%BF%E7%9C%9F%E9%80%9F%E5%BA%A6/"
            }
        ];

        const repos = [
            { id: "cpu", name: "Loongarch_1", owner: "Luyoung0001" },
            { id: "debugger", name: "mydebugger", owner: "Luyoung0001" },
            { id: "trans-api", name: "trans_api", owner: "Luyoung0001" },
            { id: "translator", name: "translate_all", owner: "Luyoung0001" },
            { id: "cpp", name: "cpp_design", owner: "Luyoung0001" }
        ];

        const files = {
            "/home/guest": {
                type: "dir",
                entries: {
                    "README": {
                        type: "file",
                        mode: "-rw-r--r--",
                        size: 97,
                        content: [
                            "Luyoung",
                            "",
                            "systems / low-level software / FPGA / debugging",
                            "",
                            "Try: posts, repos, open post la, open repo cpu"
                        ].join("\n")
                    },
                    "links": { type: "dir", mode: "drwxr-xr-x", size: 160 }
                }
            },
            "/home/guest/links": {
                type: "dir",
                entries: Object.fromEntries(Object.entries(links).map(([name, href]) => [
                    name,
                    { type: "file", mode: "-rw-r--r--", size: href.length, content: href }
                ]))
            }
        };

        const state = {
            user: "guest",
            host: "luyoung",
            cwd: "/home/guest",
            history: JSON.parse(localStorage.getItem("history") || "[]").slice(-100),
            historyIndex: -1,
            input: null,
            promptLine: null,
            readerOpen: false,
            running: false
        };

        const commands = [
            "help", "clear", "pwd", "ls", "cd", "cat", "echo", "printf", "date",
            "whoami", "hostname", "uname", "id", "history", "env", "posts", "repos",
            "open", "close", "xdg-open", "exit"
        ];

        const welcomeLines = [
            `<span class="hint">type <span class="kbd">help</span> and press <span class="kbd">Enter</span>. try <span class="kbd">posts</span>, <span class="kbd">repos</span>, <span class="kbd">open post la</span>.</span>`
        ];

        function escapeHtml(value) {
            return String(value ?? "").replace(/[&<>"]/g, char => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;"
            }[char]));
        }

        function stripHtml(value) {
            const div = document.createElement("div");
            div.innerHTML = value;
            return div.textContent || "";
        }

        function promptHtml() {
            const home = "/home/guest";
            const path = state.cwd === home ? "~" : state.cwd.replace(`${home}/`, "~/");
            return `<span class="prompt">${state.user}@${state.host}</span>:<span class="path">${escapeHtml(path)}</span>$ `;
        }

        function appendLine(html = "") {
            const line = document.createElement("div");
            line.className = "line";
            line.innerHTML = html;
            terminal.appendChild(line);
            ariaLive.textContent = stripHtml(html);
            terminal.scrollTop = terminal.scrollHeight;
            return line;
        }

        function appendText(text = "") {
            for (const line of String(text).split("\n")) {
                appendLine(escapeHtml(line));
            }
        }

        function setReaderLoading(title, url) {
            state.readerOpen = true;
            workspace.classList.add("reader-open");
            reader.setAttribute("aria-hidden", "false");
            readerTitle.textContent = title;
            readerLink.href = url || "#";
            readerBody.innerHTML = `<div class="reader-loading">fetching ${escapeHtml(title)} ...</div>`;
            terminal.scrollTop = terminal.scrollHeight;
        }

        function closeReader() {
            state.readerOpen = false;
            workspace.classList.remove("reader-open");
            reader.setAttribute("aria-hidden", "true");
            setTimeout(() => {
                if (!state.readerOpen) {
                    readerTitle.textContent = "reader";
                    readerLink.href = "#";
                    readerBody.innerHTML = `<div class="reader-loading">reader idle</div>`;
                }
            }, 430);
            focusInput();
        }

        function renderReader(title, url, html) {
            readerTitle.textContent = title;
            readerLink.href = url;
            readerBody.innerHTML = html;
            readerBody.scrollTop = 0;
        }

        function newPrompt() {
            const line = appendLine(`${promptHtml()}<span class="input-slot"></span>`);
            state.promptLine = line;
            state.input = commandInput;
            commandInput.value = "";
            line.querySelector(".input-slot").appendChild(commandInput);
            focusInput();
        }

        function freezePrompt(command) {
            state.promptLine.innerHTML = `${promptHtml()}${escapeHtml(command)}`;
            state.input = null;
            state.promptLine = null;
        }

        function focusInput() {
            if (!state.input) return;
            commandInput.focus({ preventScroll: true });
            commandInput.setSelectionRange(commandInput.value.length, commandInput.value.length);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function saveHistory() {
            state.history = state.history.slice(-100);
            localStorage.setItem("history", JSON.stringify(state.history));
        }

        function parse(input) {
            const tokens = [];
            let token = "";
            let quote = "";
            let escaped = false;

            for (const char of input) {
                if (escaped) {
                    token += char;
                    escaped = false;
                    continue;
                }
                if (char === "\\") {
                    escaped = true;
                    continue;
                }
                if ((char === "\"" || char === "'") && !quote) {
                    quote = char;
                    continue;
                }
                if (char === quote) {
                    quote = "";
                    continue;
                }
                if (/\s/.test(char) && !quote) {
                    if (token) tokens.push(token);
                    token = "";
                    continue;
                }
                token += char;
            }

            if (token) tokens.push(token);
            return { tokens, quoteOpen: Boolean(quote) };
        }

        function resolvePath(path = ".") {
            if (path === "~") return "/home/guest";
            if (path.startsWith("~/")) return `/home/guest/${path.slice(2)}`;
            if (path.startsWith("/")) return normalizePath(path);
            return normalizePath(`${state.cwd}/${path}`);
        }

        function normalizePath(path) {
            const parts = [];
            for (const part of path.split("/")) {
                if (!part || part === ".") continue;
                if (part === "..") {
                    parts.pop();
                    continue;
                }
                parts.push(part);
            }
            return `/${parts.join("/")}`;
        }

        function parentPath(path) {
            const parts = path.split("/").filter(Boolean);
            parts.pop();
            return `/${parts.join("/")}`;
        }

        function baseName(path) {
            return path.split("/").filter(Boolean).at(-1) || "/";
        }

        function stat(path) {
            if (files[path]) return files[path];
            const parent = files[parentPath(path)];
            return parent?.entries?.[baseName(path)] || null;
        }

        function fileContent(path) {
            const node = stat(path);
            return node?.type === "file" ? node.content : null;
        }

        function listDir(path, long = false, all = false) {
            const dir = files[path];
            if (!dir || dir.type !== "dir") return null;

            const entries = Object.entries(dir.entries);
            const names = all ? [[".", { type: "dir", mode: "drwxr-xr-x", size: 96 }], ["..", { type: "dir", mode: "drwxr-xr-x", size: 96 }], ...entries] : entries;

            if (!long) {
                return names.map(([name, node]) => {
                    const cls = node.type === "dir" ? "dir" : "";
                    return cls ? `<span class="${cls}">${escapeHtml(name)}</span>` : escapeHtml(name);
                }).join("  ");
            }

            const total = names.length * 4;
            const rows = names.map(([name, node]) => {
                const mode = node.mode || (node.type === "dir" ? "drwxr-xr-x" : "-rw-r--r--");
                const size = String(node.size || 96).padStart(5, " ");
                const date = "Jun 16 16:00";
                const label = node.type === "dir" ? `<span class="dir">${escapeHtml(name)}</span>` : escapeHtml(name);
                return `${mode} 1 guest guest ${size} ${date} ${label}`;
            });
            return [`total ${total}`, ...rows].join("\n");
        }

        const builtins = {
            help() {
                appendText([
                    "GNU bash, version 5.2.0(compatible)",
                    "",
                    "These shell commands are available:",
                    "  help                show this help",
                    "  pwd                 print working directory",
                    "  ls [-la] [path]     list files",
                    "  cd [path]           change directory",
                    "  cat <file>          print file",
                    "  echo <text>         print text",
                    "  date                print local date",
                    "  whoami              print user",
                    "  uname [-a]          print system name",
                    "  history             print command history",
                    "  posts               list readable blog posts",
                    "  repos               list readable github repos",
                    "  open post <id>      render a blog post in the right pane",
                    "  open repo <id>      render a github repo in the right pane",
                    "  close               close the right pane",
                    "  clear               clear terminal",
                    "  xdg-open <target>   open github/blog/thoughts/bilibili/email"
                ].join("\n"));
            },
            clear() {
                terminal.innerHTML = "";
            },
            pwd() {
                appendText(state.cwd);
            },
            ls(args) {
                const flags = args.filter(arg => arg.startsWith("-")).join("");
                const paths = args.filter(arg => !arg.startsWith("-"));
                const target = resolvePath(paths[0] || ".");
                const long = flags.includes("l");
                const all = flags.includes("a");
                const node = stat(target);

                if (!node) {
                    appendLine(`<span class="error">ls: cannot access '${escapeHtml(paths[0] || ".")}': No such file or directory</span>`);
                    return;
                }
                if (node.type === "file") {
                    appendText(baseName(target));
                    return;
                }
                appendLine(listDir(target, long, all));
            },
            cd(args) {
                const target = resolvePath(args[0] || "~");
                const node = stat(target);

                if (!node) {
                    appendLine(`<span class="error">bash: cd: ${escapeHtml(args[0] || "~")}: No such file or directory</span>`);
                    return;
                }
                if (node.type !== "dir") {
                    appendLine(`<span class="error">bash: cd: ${escapeHtml(args[0])}: Not a directory</span>`);
                    return;
                }
                state.cwd = target;
            },
            cat(args) {
                if (!args.length) return;

                for (const arg of args) {
                    const target = resolvePath(arg);
                    const node = stat(target);
                    if (!node) {
                        appendLine(`<span class="error">cat: ${escapeHtml(arg)}: No such file or directory</span>`);
                    } else if (node.type === "dir") {
                        appendLine(`<span class="error">cat: ${escapeHtml(arg)}: Is a directory</span>`);
                    } else {
                        appendText(fileContent(target));
                    }
                }
            },
            echo(args) {
                appendText(args.join(" "));
            },
            printf(args) {
                appendText(args.join(" ").replace(/\\n/g, "\n"));
            },
            date() {
                appendText(new Date().toString());
            },
            whoami() {
                appendText(state.user);
            },
            hostname() {
                appendText(state.host);
            },
            uname(args) {
                appendText(args.includes("-a")
                    ? "Linux luyoung 6.6.0-static #1 SMP PREEMPT_DYNAMIC x86_64 GNU/Linux"
                    : "Linux");
            },
            id() {
                appendText("uid=1000(guest) gid=1000(guest) groups=1000(guest)");
            },
            history() {
                state.history.forEach((item, index) => {
                    appendText(`${String(index + 1).padStart(5, " ")}  ${item}`);
                });
            },
            env() {
                appendText([
                    "SHELL=/bin/bash",
                    "USER=guest",
                    "HOME=/home/guest",
                    "HOSTNAME=luyoung",
                    "TERM=xterm-256color",
                    "PWD=" + state.cwd
                ].join("\n"));
            },
            posts() {
                const rows = blogPosts.map(post => `${post.id.padEnd(10, " ")} ${post.date}  ${post.title}`);
                appendText(rows.join("\n"));
            },
            repos() {
                const rows = repos.map(repo => `${repo.id.padEnd(10, " ")} ${repo.owner}/${repo.name}`);
                appendText(rows.join("\n"));
            },
            "xdg-open"(args) {
                openTarget(args[0], "xdg-open");
            },
            async open(args) {
                await openSmart(args);
            },
            close() {
                closeReader();
                appendText("reader closed");
            },
            exit() {
                appendText("logout");
            }
        };

        function openTarget(target, command) {
            if (!target) {
                appendLine(`<span class="error">${command}: missing operand</span>`);
                return;
            }

            const href = links[target] || fileContent(resolvePath(target)) || target;
            try {
                const url = new URL(href, location.href);
                if (!["http:", "https:", "mailto:"].includes(url.protocol)) throw new Error("bad protocol");
                window.open(url.href, "_blank", "noopener,noreferrer");
            } catch {
                appendLine(`<span class="error">${command}: ${escapeHtml(target)}: No such file or URL</span>`);
            }
        }

        function findPost(id) {
            return blogPosts.find(post => post.id === id || post.title === id);
        }

        function findRepo(id) {
            return repos.find(repo => repo.id === id || repo.name === id || `${repo.owner}/${repo.name}` === id);
        }

        async function openSmart(args) {
            if (!args.length) {
                appendLine(`<span class="error">open: missing operand</span>`);
                return;
            }

            const [kind, value] = args;
            if (kind === "post") {
                await openPost(value);
                return;
            }
            if (kind === "repo") {
                await openRepo(value);
                return;
            }
            if (findPost(kind)) {
                await openPost(kind);
                return;
            }
            if (findRepo(kind)) {
                await openRepo(kind);
                return;
            }
            openTarget(kind, "open");
        }

        async function openPost(id) {
            const post = findPost(id);
            if (!post) {
                appendLine(`<span class="error">open: post not found: ${escapeHtml(id || "")}</span>`);
                return;
            }

            appendText(`fetch ${post.url}`);
            setReaderLoading(post.title, post.url);

            try {
                const response = await fetch(post.url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const html = await response.text();
                const doc = new DOMParser().parseFromString(html, "text/html");
                const rendered = renderBlogDocument(doc, post);
                renderReader(post.title, post.url, rendered);
                appendText(`rendered post: ${post.id}`);
            } catch (error) {
                renderReader(post.title, post.url, renderFallback(post.title, post.url, error));
                appendLine(`<span class="error">open: fetch failed: ${escapeHtml(error.message)}</span>`);
            }
        }

        async function openRepo(id) {
            const repo = findRepo(id);
            if (!repo) {
                appendLine(`<span class="error">open: repo not found: ${escapeHtml(id || "")}</span>`);
                return;
            }

            const repoUrl = `https://github.com/${repo.owner}/${repo.name}`;
            appendText(`fetch https://api.github.com/repos/${repo.owner}/${repo.name}`);
            setReaderLoading(`${repo.owner}/${repo.name}`, repoUrl);

            try {
                const [metaResponse, readmeResponse] = await Promise.all([
                    fetch(`https://api.github.com/repos/${repo.owner}/${repo.name}`),
                    fetch(`https://api.github.com/repos/${repo.owner}/${repo.name}/readme`)
                ]);
                if (!metaResponse.ok) throw new Error(`repo HTTP ${metaResponse.status}`);
                const meta = await metaResponse.json();
                let readme = "";
                if (readmeResponse.ok) {
                    const payload = await readmeResponse.json();
                    readme = decodeBase64(payload.content || "");
                }
                renderReader(`${repo.owner}/${repo.name}`, repoUrl, renderRepoDocument(meta, readme));
                appendText(`rendered repo: ${repo.id}`);
            } catch (error) {
                renderReader(`${repo.owner}/${repo.name}`, repoUrl, renderFallback(`${repo.owner}/${repo.name}`, repoUrl, error));
                appendLine(`<span class="error">open: fetch failed: ${escapeHtml(error.message)}</span>`);
            }
        }

        function renderBlogDocument(doc, post) {
            const title = doc.querySelector("meta[property='og:title']")?.content || doc.querySelector("h1")?.textContent || post.title;
            const description = doc.querySelector("meta[property='og:description']")?.content || "";
            const article = doc.querySelector("article .markdown-body")
                || doc.querySelector(".markdown-body")
                || doc.querySelector("article")
                || doc.querySelector("#board")
                || doc.body;

            const clone = article.cloneNode(true);
            clone.querySelectorAll("script, style, nav, .toc, .post-meta, .post-prevnext, #comments, .modal").forEach(node => node.remove());
            absolutizeUrls(clone, post.url);
            sanitizeNode(clone);

            return `
                <section class="doc">
                    <p class="doc-kicker">blog / ${escapeHtml(post.date)}</p>
                    <h1>${escapeHtml(title)}</h1>
                    ${description ? `<blockquote>${escapeHtml(description)}</blockquote>` : ""}
                    ${clone.innerHTML}
                </section>
            `;
        }

        function renderRepoDocument(meta, readme) {
            const description = meta.description || "No description.";
            return `
                <section class="doc">
                    <p class="doc-kicker">github repository</p>
                    <h1>${escapeHtml(meta.full_name)}</h1>
                    <p>${escapeHtml(description)}</p>
                    <div class="repo-meta">
                        <div><span>stars</span><strong>${escapeHtml(meta.stargazers_count)}</strong></div>
                        <div><span>forks</span><strong>${escapeHtml(meta.forks_count)}</strong></div>
                        <div><span>language</span><strong>${escapeHtml(meta.language || "mixed")}</strong></div>
                    </div>
                    ${readme ? markdownToHtml(readme) : "<p class=\"dim\">README not available.</p>"}
                </section>
            `;
        }

        function renderFallback(title, url, error) {
            return `
                <section class="doc">
                    <p class="doc-kicker">fetch failed</p>
                    <h1>${escapeHtml(title)}</h1>
                    <p class="error">${escapeHtml(error.message || String(error))}</p>
                    <p><a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">open source page</a></p>
                </section>
            `;
        }

        function absolutizeUrls(root, baseUrl) {
            root.querySelectorAll("[href]").forEach(node => {
                node.setAttribute("href", new URL(node.getAttribute("href"), baseUrl).href);
                node.setAttribute("target", "_blank");
                node.setAttribute("rel", "noopener noreferrer");
            });
            root.querySelectorAll("[src]").forEach(node => {
                node.setAttribute("src", new URL(node.getAttribute("src"), baseUrl).href);
            });
        }

        function sanitizeNode(root) {
            root.querySelectorAll("*").forEach(node => {
                for (const attr of [...node.attributes]) {
                    if (/^on/i.test(attr.name)) node.removeAttribute(attr.name);
                    if (attr.name === "style") node.removeAttribute(attr.name);
                    if (attr.name === "class") node.removeAttribute(attr.name);
                }
            });
        }

        function decodeBase64(value) {
            const binary = atob(String(value).replace(/\s/g, ""));
            const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));
            return new TextDecoder("utf-8").decode(bytes);
        }

        function markdownToHtml(markdown) {
            const lines = markdown.replace(/\r\n/g, "\n").split("\n");
            const html = [];
            let inCode = false;
            let listOpen = false;
            let paragraph = [];

            function flushParagraph() {
                if (!paragraph.length) return;
                html.push(`<p>${inlineMarkdown(paragraph.join(" "))}</p>`);
                paragraph = [];
            }

            function closeList() {
                if (!listOpen) return;
                html.push("</ul>");
                listOpen = false;
            }

            for (const line of lines) {
                if (line.startsWith("```")) {
                    if (inCode) {
                        html.push("</code></pre>");
                        inCode = false;
                    } else {
                        flushParagraph();
                        closeList();
                        html.push("<pre><code>");
                        inCode = true;
                    }
                    continue;
                }
                if (inCode) {
                    html.push(escapeHtml(line));
                    continue;
                }
                if (!line.trim()) {
                    flushParagraph();
                    closeList();
                    continue;
                }
                const heading = line.match(/^(#{1,3})\s+(.+)$/);
                if (heading) {
                    flushParagraph();
                    closeList();
                    const level = heading[1].length;
                    html.push(`<h${level}>${inlineMarkdown(heading[2])}</h${level}>`);
                    continue;
                }
                const item = line.match(/^\s*[-*]\s+(.+)$/);
                if (item) {
                    flushParagraph();
                    if (!listOpen) {
                        html.push("<ul>");
                        listOpen = true;
                    }
                    html.push(`<li>${inlineMarkdown(item[1])}</li>`);
                    continue;
                }
                paragraph.push(line.trim());
            }

            flushParagraph();
            closeList();
            if (inCode) html.push("</code></pre>");
            return html.join("\n");
        }

        function inlineMarkdown(value) {
            return escapeHtml(value)
                .replace(/`([^`]+)`/g, "<code>$1</code>")
                .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
                .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
        }

        async function run(commandLine) {
            const parsed = parse(commandLine);
            if (parsed.quoteOpen) {
                appendLine(`<span class="error">bash: unexpected EOF while looking for matching quote</span>`);
                return;
            }

            const [command, ...args] = parsed.tokens;
            if (!command) return;

            const builtin = builtins[command];
            if (!builtin) {
                appendLine(`<span class="error">bash: ${escapeHtml(command)}: command not found</span>`);
                return;
            }

            await builtin(args);
        }

        function currentInput() {
            return state.input ? commandInput.value : "";
        }

        function setCurrentInput(value) {
            if (!state.input) return;
            commandInput.value = value;
            focusInput();
        }

        async function submit() {
            if (state.running) return;
            state.running = true;
            const commandLine = currentInput();
            freezePrompt(commandLine);

            try {
                if (commandLine.trim()) {
                    state.history.push(commandLine);
                    state.historyIndex = state.history.length;
                    saveHistory();
                    await run(commandLine);
                }

                if (!state.input) newPrompt();
            } finally {
                state.running = false;
                focusInput();
            }
        }

        function complete() {
            const value = currentInput();
            const cursorToken = value.split(/\s+/).at(-1) || "";
            const pool = [...commands, ...Object.keys(links), ...Object.keys(files[state.cwd]?.entries || {})].sort();
            const matches = pool.filter(item => item.startsWith(cursorToken));

            if (matches.length === 1) {
                const next = value.replace(new RegExp(`${cursorToken.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}$`), matches[0]);
                setCurrentInput(next);
            } else if (matches.length > 1) {
                freezePrompt(value);
                appendText(matches.join("  "));
                newPrompt();
                setCurrentInput(value);
            }
        }

        function interrupt() {
            const value = currentInput();
            freezePrompt(`${value}^C`);
            newPrompt();
        }

        terminal.addEventListener("click", () => {
            focusInput();
        });

        function handleKeydown(event) {
            if (!state.input) return;
            if (state.running) {
                event.preventDefault();
                return;
            }

            if (event.key === "Enter") {
                event.preventDefault();
                submit();
                return;
            }
            if (event.key === "Tab") {
                event.preventDefault();
                complete();
                return;
            }
            if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "l") {
                event.preventDefault();
                terminal.innerHTML = "";
                newPrompt();
                return;
            }
            if (event.ctrlKey && event.key.toLowerCase() === "c") {
                event.preventDefault();
                interrupt();
                return;
            }
            if (event.key === "ArrowUp") {
                event.preventDefault();
                if (state.historyIndex > 0) {
                    state.historyIndex -= 1;
                    setCurrentInput(state.history[state.historyIndex] || "");
                }
                return;
            }
            if (event.key === "ArrowDown") {
                event.preventDefault();
                if (state.historyIndex < state.history.length) {
                    state.historyIndex += 1;
                    setCurrentInput(state.history[state.historyIndex] || "");
                }
            }
        }

        readerClose.addEventListener("click", () => {
            closeReader();
            focusInput();
        });

        commandInput.addEventListener("keydown", handleKeydown);

        async function boot() {
            appendText("Last login: Tue Jun 16 16:00:00 on tty1");
            welcomeLines.forEach(line => appendLine(line));
            newPrompt();
            const params = new URLSearchParams(location.search);
            const commandBatch = params.get("cmds");
            const commandsToRun = commandBatch ? commandBatch.split(";").map(item => item.trim()).filter(Boolean) : [params.get("cmd")].filter(Boolean);
            for (const command of commandsToRun) {
                setCurrentInput(command);
                await submit();
            }
            focusInput();
        }

        window.addEventListener("load", () => {
            boot();
        });
    </script>
</body>

</html>
