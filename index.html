        function stripMarkdown(value) {
            return String(value || "")
                .replace(/!\[[^\]]*]\([^)]+\)/g, "")
                .replace(/\[([^\]]+)]\((https?:\/\/[^)]+)\)/g, "$1")
                .replace(/\*\*([^*]+)\*\*/g, "$1")
                .replace(/`([^`]+)`/g, "$1")
                .replace(/\s+/g, " ")
                .trim();
        }

        function decodeBingUrl(value) {
            const encoded = new URL(value).searchParams.get("u");
            if (!encoded) return value;
            const payload = encoded.startsWith("a1") ? encoded.slice(2) : encoded;
            try {
                const normalized = payload.replace(/-/g, "+").replace(/_/g, "/");
                const padded = normalized.padEnd(Math.ceil(normalized.length / 4) * 4, "=");
                const decoded = decodeBase64(padded);
                return /^https?:\/\//i.test(decoded) ? decoded : value;
            } catch {
                return value;
            }
        }

        function resolveSearchRedirect(value) {
            try {
                const url = new URL(value);
                if (url.hostname.includes("duckduckgo.com") && url.searchParams.get("uddg")) {
                    return url.searchParams.get("uddg");
                }
                if (url.hostname.includes("bing.com") && url.pathname.startsWith("/ck/")) {
                    return decodeBingUrl(value);
                }
                return value;
            } catch {
                return value;
            }
        }

        function isSearchChromeUrl(value) {
            try {
                const url = new URL(value);
                const host = url.hostname.replace(/^www\./, "");
                return [
                    "google.com",
                    "bing.com",
                    "duckduckgo.com",
                    "support.google.com",
                    "accounts.google.com",
                    "maps.google.com"
                ].some(domain => host === domain || host.endsWith(`.${domain}`));
            } catch {
                return true;
            }
        }

        function resultFingerprint(item) {
            try {
                const url = new URL(item.url);
                url.hash = "";
                return url.href.replace(/\/$/, "");
            } catch {
                return item.url;
            }
        }

        function cleanSearchSnippet(value) {
            return stripMarkdown(value)
                .replace(/URL Source:.+$/i, "")
                .replace(/Markdown Content:.+$/i, "")
                .replace(/\bCached\b|\bSimilar\b/g, "")
                .trim();
        }

        function parseDuckDuckGoMarkdown(markdown) {
            const results = [];
            const pattern = /^\s*(\d+)\.\[([^\]]+)]\((https?:\/\/[^)]+)\)\s*\n([\s\S]*?)(?=\n\s*\d+\.\[|\n\s*\[Feedback]|\n\s*Title:|$)/gm;
            let match;
            while ((match = pattern.exec(markdown))) {
                const title = stripMarkdown(match[2]);
                const url = resolveSearchRedirect(match[3]);
                const snippet = cleanSearchSnippet(match[4].split("\n").filter(line => !/^https?:\/\//i.test(line.trim())).join(" "));
                if (title && /^https?:\/\//i.test(url) && !isSearchChromeUrl(url)) {
                    results.push({ title, url, snippet });
                }
            }
            return results;
        }

        function parseBingMarkdown(markdown) {
            const results = [];
            const pattern = /^\s*(\d+)\.\s+## \[([^\]]+)]\((https?:\/\/[^)]+)\)\s*\n+([\s\S]*?)(?=\n\s*\d+\.\s+## \[|$)/gm;
            let match;
            while ((match = pattern.exec(markdown))) {
                const title = stripMarkdown(match[2]);
                const url = resolveSearchRedirect(match[3]);
                const snippet = cleanSearchSnippet(match[4]);
                if (title && /^https?:\/\//i.test(url) && !isSearchChromeUrl(url)) {
                    results.push({ title, url, snippet });
                }
            }
            return results;
        }

        function parseGoogleMarkdown(markdown) {
            const results = [];
            const pattern = /^\s*\*\s+\[]\((https?:\/\/[^)]+)\)([^\n]+?)(?=\s{2,}!\[|\n|\r|$)/gm;
            let match;
            while ((match = pattern.exec(markdown))) {
                const title = stripMarkdown(match[2]);
                const url = resolveSearchRedirect(match[1]);
                if (title && /^https?:\/\//i.test(url) && !isSearchChromeUrl(url)) {
                    results.push({ title, url, snippet: "" });
                }
            }
            return results;
        }

        function parseMarkdownSearchResults(markdown, source) {
            const parsers = source === "bing"
                ? [parseBingMarkdown, parseDuckDuckGoMarkdown, parseGoogleMarkdown]
                : [parseGoogleMarkdown, parseDuckDuckGoMarkdown, parseBingMarkdown];
            const merged = uniqueBy(parsers.flatMap(parse => parse(markdown)), resultFingerprint);
            return numberWebResults(merged.slice(0, 50));
        }

        async function searchWithMarkdownProvider(url, source, fallback) {
            const markdown = await fetchMarkdownSearch(url);
            const results = parseMarkdownSearchResults(markdown, source);

            return numberWebResults([fallback]);
        }

        function renderPage(delta = 0) {
            if (!state.pager) return false;
            const maxPage = Math.max(0, Math.ceil(state.pager.items.length / PAGE_SIZE) - 1);
            const nextPage = Math.max(0, Math.min(maxPage, state.pager.page + delta));

            if (nextPage === state.pager.page && delta !== 0) {
                appendText(nextPage === maxPage ? "pager: already at last page" : "pager: already at first page");
                return true;
            }

            state.pager.page = nextPage;
            const start = nextPage * PAGE_SIZE;
            const pageItems = state.pager.items.slice(start, start + PAGE_SIZE);
            const pageLabel = `${nextPage + 1}/${maxPage + 1}`;
            const headerByType = {
                posts: `posts page ${pageLabel} (${state.pager.items.length} total) -- ↓ next, ↑ prev, open post <id>`,
                repos: `repos page ${pageLabel} (${state.pager.items.length} total) -- ↓ next, ↑ prev, open repo <id>`,
                "github-search": `github search page ${pageLabel} (${state.pager.items.length} total) -- ↓ next, ↑ prev, github open <id>`,
                "web-search": `web search page ${pageLabel} (${state.pager.items.length} total) -- ↓ next, ↑ prev, web open <id>`
            };
            const idWidth = Math.max(18, ...pageItems.map(item => item.id.length));
            const columnByType = {
                posts: `${"id".padEnd(idWidth, " ")} date        title`,
                repos: `${"id".padEnd(idWidth, " ")} ★    updated     repository`,
                "github-search": `${"id".padEnd(idWidth, " ")} ★    updated     repository`,
                "web-search": `${"id".padEnd(idWidth, " ")} title  url`
            };
            const rows = pageItems.map(item => {
                if (state.pager.type === "posts") return postRow(item, idWidth);
                if (state.pager.type === "web-search") return webRow(item, idWidth);
                return repoRow(item, idWidth);
            });
            appendText([headerByType[state.pager.type] || headerByType.repos, columnByType[state.pager.type] || columnByType.repos, ...rows].join("\n"));
            return true;
        }

                    showOops("github search needs a query.", ["github search riscv", "github open 0"]);
                    appendLine(`<span class="error">github search: missing query</span>`);
                    return;

                try {
                    appendText(`fetch ${GITHUB_SEARCH_API}?q=${query}`);

                    setPager("github-search", results);

                    showOops(`GitHub search failed: ${error.message}`, ["github search riscv"]);
                    appendLine(`<span class="error">github search: ${escapeHtml(error.message)}</span>`);
                }
                return;
            }

            if (subcommand === "open") {
                const id = rest[0];
                if (!id) {
                    showOops("github open needs a result id from the latest GitHub search.", ["github search riscv", "github open 0"]);
                    appendLine(`<span class="error">github open: missing id</span>`);
                    return;
                }
                const repo = findGitHubResult(id);
                if (!repo) {
                    showOops(`GitHub search result not found: ${id}`, ["github search riscv", "github open 0"]);
                    appendLine(`<span class="error">github open: result not found: ${escapeHtml(id)}</span>`);
                    return;

                await openRepoObject(repo);
                return;
            }

            showOops("Unknown github command.", ["github search riscv", "github open 0"]);
            appendLine(`<span class="error">github: usage: github search <query> | github open <id></span>`);
        }

                const query = rest.join(" ").trim();
                if (!query) {
                    showOops("web search needs a query.", ["web search loongarch jit", "web open 0"]);
                    appendLine(`<span class="error">web search: missing query</span>`);
                    return;
                }

                try {
                    appendText(`web search (${dataState.webProvider}) ${query}`);
                    const results = await searchWeb(query);
                    setPager("web-search", results);
                } catch (error) {
                    showWebProviderOops(error.message);
                    appendLine(`<span class="error">web search: ${escapeHtml(error.message)}</span>`);
                }
                return;
            }

            if (subcommand === "open") {
                const id = rest[0];
                if (!id) {
                    showOops("web open needs a result id from the latest web search.", ["web search loongarch jit", "web open 0"]);
                    appendLine(`<span class="error">web open: missing id</span>`);
                    return;
                }
                const item = findWebResult(id);
                if (!item) {
                    showOops(`Web search result not found: ${id}`, ["web search loongarch jit", "web open 0"]);
                    appendLine(`<span class="error">web open: result not found: ${escapeHtml(id)}</span>`);
                    return;
                }
                openWebResult(item);
                return;
            }

            showOops("Unknown web command.", ["web engine", "web engine bing", "web search loongarch jit", "web open 0"]);
            appendLine(`<span class="error">web: usage: web engine [name] | web search <query> | web open <id></span>`);
        }

        function showWebProviderOops(message) {
            showOops(`Web search provider is not ready: ${message}`, [
                "web engine google",
                "web engine bing",
                "web engine custom-json",
                "localStorage.setItem('webSearchEndpoint', 'https://your-proxy/search?q={query}')"
            ]);
        }

        function openWebResult(item) {
            setReaderLoading(item.title, item.url);
            renderReader(item.title, item.url, `
                <section class="doc">
                    <p class="doc-kicker">web search result</p>
                    <h1>${escapeHtml(item.title)}</h1>
                    ${item.snippet ? `<blockquote>${escapeHtml(item.snippet)}</blockquote>` : ""}
                    <p><a href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.url)}</a></p>
                </section>
            `);
            appendText(`opened web result: ${item.id}`);
        }

        async function openSmart(args) {
            if (!args.length) {
                appendLine(`<span class="error">open: missing operand</span>`);
                showOops("open needs a target.", ["open post 0", "open repo 0", "open github"]);
                return;
            }

            const [kind, value] = args;
            if ((kind === "posts" || kind === "post") && kind !== "post") {
                showOops("Use singular post when opening one item. Run posts first, then open the numeric id.", ["posts", "open post 0"]);
                appendLine(`<span class="error">open: did you mean 'open post ${escapeHtml(value || "0")}'?</span>`);
                return;
            }
            if ((kind === "repos" || kind === "gitrepo") && kind !== "repo") {
                showOops("Use singular repo when opening one repository.", ["repos", "open repo 0"]);
                appendLine(`<span class="error">open: did you mean 'open repo ${escapeHtml(value || "0")}'?</span>`);
                return;
            }
            if (kind === "post") {
                if (!value) {
                    showOops("Missing post id. Run posts, then open one numeric id.", ["posts", "open post 0"]);
                    appendLine(`<span class="error">open: missing post id</span>`);
                    return;
                }
                await openPost(value);
                return;
            }
            if (kind === "repo") {
                if (!value) {
                    showOops("Missing repo id. Run repos, then open one repository id.", ["repos", "open repo 0"]);
                    appendLine(`<span class="error">open: missing repo id</span>`);
                    return;
                }
                await openRepo(value);
                return;
            }
            if (links[kind] || fileContent(resolvePath(kind))) {
                openTarget(kind, "open");
                return;
            }
            if (findPost(kind)) {
                await openPost(kind);
                return;
            }
            if (findRepo(kind)) {
                await openRepo(kind);
                return;
            }
            if (await resolvePost(kind)) {
                await openPost(kind);
                return;
            }
            if (await resolveRepo(kind)) {
                await openRepo(kind);
                return;
            }
            if (looksLikeExternalTarget(kind)) {
                openTarget(kind, "open");
                return;
            }
            showOops(`Unknown open target: ${kind}`, ["open post 0", "open repo 0", "open github"]);
            appendLine(`<span class="error">open: ${escapeHtml(kind)}: unknown target</span>`);
        }

        async function openPost(id) {
            const post = await resolvePost(id);
            if (!post) {
                showOops(`Post not found: ${id || ""}`, ["posts", "open post 0"]);
                appendLine(`<span class="error">open: post not found: ${escapeHtml(id || "")}</span>`);
                return;
            }

            appendText(`fetch ${post.url}`);
            setReaderLoading(post.title, post.url);

            try {
                const response = await fetch(post.url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const html = await response.text();
                const doc = new DOMParser().parseFromString(html, "text/html");
                const rendered = renderBlogDocument(doc, post);
                renderReader(post.title, post.url, rendered);
                appendText(`rendered post: ${post.id}`);
            } catch (error) {
                renderReader(post.title, post.url, renderFallback(post.title, post.url, error));
                appendLine(`<span class="error">open: fetch failed: ${escapeHtml(error.message)}</span>`);
            }
        }

        async function openRepo(id) {
            const repo = await resolveRepo(id);
            if (!repo) {
                showOops(`Repo not found: ${id || ""}`, ["repos", "open repo 0"]);
                appendLine(`<span class="error">open: repo not found: ${escapeHtml(id || "")}</span>`);
                return;
            }

            await openRepoObject(repo);
        }

        async function openRepoObject(repo) {
            const repoUrl = repo.url || `https://github.com/${repo.owner}/${repo.name}`;
            appendText(`fetch https://api.github.com/repos/${repo.owner}/${repo.name}`);
            setReaderLoading(`${repo.owner}/${repo.name}`, repoUrl);

            try {
                const [metaResponse, readmeResponse] = await Promise.all([
                    fetch(`https://api.github.com/repos/${repo.owner}/${repo.name}`),
                    fetch(`https://api.github.com/repos/${repo.owner}/${repo.name}/readme`)
                ]);
                if (!metaResponse.ok) throw new Error(`repo HTTP ${metaResponse.status}`);
                const meta = await metaResponse.json();
                let readme = "";
                if (readmeResponse.ok) {
                    const payload = await readmeResponse.json();
                    readme = decodeBase64(payload.content || "");
                }
                renderReader(`${repo.owner}/${repo.name}`, repoUrl, renderRepoDocument(meta, readme));
                appendText(`rendered repo: ${repo.id}`);
            } catch (error) {
                renderReader(`${repo.owner}/${repo.name}`, repoUrl, renderFallback(`${repo.owner}/${repo.name}`, repoUrl, error));
                appendLine(`<span class="error">open: fetch failed: ${escapeHtml(error.message)}</span>`);
            }
        }

        function renderBlogDocument(doc, post) {
            const title = doc.querySelector("meta[property='og:title']")?.content || doc.querySelector("h1")?.textContent || post.title;
            const description = doc.querySelector("meta[property='og:description']")?.content || "";
            const article = doc.querySelector("article .markdown-body")
                || doc.querySelector(".markdown-body")
                || doc.querySelector("article")
                || doc.querySelector("#board")
                || doc.body;

            const clone = article.cloneNode(true);
            clone.querySelectorAll("script, style, nav, .toc, .post-meta, .post-prevnext, #comments, .modal").forEach(node => node.remove());
            absolutizeUrls(clone, post.url);
            sanitizeNode(clone);

            return `
                <section class="doc">
                    <p class="doc-kicker">blog / ${escapeHtml(post.date)}</p>
                    <h1>${escapeHtml(title)}</h1>
                    ${description ? `<blockquote>${escapeHtml(description)}</blockquote>` : ""}
                    ${clone.innerHTML}
                </section>
            `;
        }

        function renderRepoDocument(meta, readme) {
            const description = meta.description || "No description.";
            return `
                <section class="doc">
                    <p class="doc-kicker">github repository</p>
                    <h1>${escapeHtml(meta.full_name)}</h1>
                    <p>${escapeHtml(description)}</p>
                    <div class="repo-meta">
                        <div><span>stars</span><strong>${escapeHtml(meta.stargazers_count)}</strong></div>
                        <div><span>forks</span><strong>${escapeHtml(meta.forks_count)}</strong></div>
                        <div><span>language</span><strong>${escapeHtml(meta.language || "mixed")}</strong></div>
                    </div>
                    ${readme ? markdownToHtml(readme) : "<p class=\"dim\">README not available.</p>"}
                </section>
            `;
        }

        function renderFallback(title, url, error) {
            return `
                <section class="doc">
                    <p class="doc-kicker">fetch failed</p>
                    <h1>${escapeHtml(title)}</h1>
                    <p class="error">${escapeHtml(error.message || String(error))}</p>
                    <p><a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">open source page</a></p>
                </section>
            `;
        }

        function absolutizeUrls(root, baseUrl) {
            root.querySelectorAll("[href]").forEach(node => {
                node.setAttribute("href", new URL(node.getAttribute("href"), baseUrl).href);
                node.setAttribute("target", "_blank");
                node.setAttribute("rel", "noopener noreferrer");
            });
            root.querySelectorAll("[src]").forEach(node => {
                node.setAttribute("src", new URL(node.getAttribute("src"), baseUrl).href);
            });
        }

        function sanitizeNode(root) {
            root.querySelectorAll("*").forEach(node => {
                for (const attr of [...node.attributes]) {
                    if (/^on/i.test(attr.name)) node.removeAttribute(attr.name);
                    if (attr.name === "style") node.removeAttribute(attr.name);
                    if (attr.name === "class") node.removeAttribute(attr.name);
                }
            });
        }

        function decodeBase64(value) {
            const binary = atob(String(value).replace(/\s/g, ""));
            const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));
            return new TextDecoder("utf-8").decode(bytes);
        }

        function markdownToHtml(markdown) {
            const lines = markdown.replace(/\r\n/g, "\n").split("\n");
            const html = [];
            let inCode = false;
            let listOpen = false;
            let paragraph = [];

            function flushParagraph() {
                if (!paragraph.length) return;
                html.push(`<p>${inlineMarkdown(paragraph.join(" "))}</p>`);
                paragraph = [];
            }

            function closeList() {
                if (!listOpen) return;
                html.push("</ul>");
                listOpen = false;
            }

            for (const line of lines) {
                if (line.startsWith("```")) {
                    if (inCode) {
                        html.push("</code></pre>");
                        inCode = false;
                    } else {
                        flushParagraph();
                        closeList();
                        html.push("<pre><code>");
                        inCode = true;
                    }
                    continue;
                }
                if (inCode) {
                    html.push(escapeHtml(line));
                    continue;
                }
                if (!line.trim()) {
                    flushParagraph();
                    closeList();
                    continue;
                }
                const heading = line.match(/^(#{1,3})\s+(.+)$/);
                if (heading) {
                    flushParagraph();
                    closeList();
                    const level = heading[1].length;
                    html.push(`<h${level}>${inlineMarkdown(heading[2])}</h${level}>`);
                    continue;
                }
                const item = line.match(/^\s*[-*]\s+(.+)$/);
                if (item) {
                    flushParagraph();
                    if (!listOpen) {
                        html.push("<ul>");
                        listOpen = true;
                    }
                    html.push(`<li>${inlineMarkdown(item[1])}</li>`);
                    continue;
                }
                paragraph.push(line.trim());
            }

            flushParagraph();
            closeList();
            if (inCode) html.push("</code></pre>");
            return html.join("\n");
        }

        function inlineMarkdown(value) {
            return escapeHtml(value)
                .replace(/`([^`]+)`/g, "<code>$1</code>")
                .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
                .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
        }

        async function run(commandLine) {
            const parsed = parse(commandLine);
            if (parsed.quoteOpen) {
                appendLine(`<span class="error">bash: unexpected EOF while looking for matching quote</span>`);
                return;
            }

            const [command, ...args] = parsed.tokens;
            if (!command) return;

            const builtin = builtins[command];
            if (!builtin) {
                appendLine(`<span class="error">bash: ${escapeHtml(command)}: command not found</span>`);
                return;
            }

            await builtin(args);
        }

        function currentInput() {
            return state.input ? commandInput.value : "";
        }

        function setCurrentInput(value) {
            if (!state.input) return;
            commandInput.value = value;
            updateInputMirror();
            focusInput();
        }

        async function submit() {
            if (state.running) return;
            state.running = true;
            const commandLine = currentInput();
            const commandName = parse(commandLine).tokens[0] || "";
            const keepsPager = ["posts", "repos", "gitrepo", "github", "web", "google", "next", "prev"].includes(commandName);
            freezePrompt(commandLine);

            try {
                if (commandLine.trim()) {
                    if (!keepsPager) state.pagerArmed = false;
                    state.history.push(commandLine);
                    state.historyIndex = state.history.length;
                    saveHistory();
                    await run(commandLine);
                }

                if (!state.input) newPrompt();
            } finally {
                state.running = false;
                focusInput();
            }
        }

        function complete() {
            const value = currentInput();
            const cursorToken = value.split(/\s+/).at(-1) || "";
            const pool = [...commands, ...Object.keys(links), ...Object.keys(files[state.cwd]?.entries || {})].sort();
            const matches = pool.filter(item => item.startsWith(cursorToken));

            if (matches.length === 1) {
                const next = value.replace(new RegExp(`${cursorToken.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}$`), matches[0]);
                setCurrentInput(next);
            } else if (matches.length > 1) {
                freezePrompt(value);
                appendText(matches.join("  "));
                newPrompt();
                setCurrentInput(value);
            }
        }

        function interrupt() {
            const value = currentInput();
            freezePrompt(`${value}^C`);
            newPrompt();
        }

        function hasSelection() {
            const selection = window.getSelection();
            return Boolean(selection && !selection.isCollapsed && selection.toString());
        }

        function pageFromKeyboard(delta) {
            if (!state.pager || !state.pagerArmed || currentInput()) return false;

            if (state.promptLine) {
                state.promptLine.remove();
                state.promptLine = null;
                state.input = null;
            }

            renderPage(delta);
            newPrompt();
            return true;
        }

        terminal.addEventListener("click", () => {
            if (hasSelection()) return;
            focusInput();
        });

        function handleKeydown(event) {
            if (typeof dataState.gameKeyHandler === "function") {
                const handled = dataState.gameKeyHandler(event);
                if (handled) return;
            }
            if (!state.input) return;
            if (state.running) {
                event.preventDefault();
                return;
            }

            if (event.key === "Enter") {
                event.preventDefault();
                submit();
                return;
            }
            if (event.key === "Tab") {
                event.preventDefault();
                complete();
                return;
            }
            if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "l") {
                event.preventDefault();
                terminal.innerHTML = "";
                state.pagerArmed = false;
                newPrompt();
                return;
            }
            if (event.ctrlKey && event.key.toLowerCase() === "c") {
                if (hasSelection()) return;
                event.preventDefault();
                interrupt();
                return;
            }
            if (event.key === "ArrowUp") {
                event.preventDefault();
                if (pageFromKeyboard(-1)) return;
                if (state.historyIndex > 0) {
                    state.historyIndex -= 1;
                    setCurrentInput(state.history[state.historyIndex] || "");
                }
                return;
            }
            if (event.key === "ArrowDown") {
                event.preventDefault();
                if (pageFromKeyboard(1)) return;
                if (state.historyIndex < state.history.length) {
                    state.historyIndex += 1;
                    setCurrentInput(state.history[state.historyIndex] || "");
                }
            }
        }

        readerClose.addEventListener("click", () => {
            closeReader();
            focusInput();
        });

        function closeTopbarMenus() {
            topbarLinks.querySelectorAll(".menu-group.open").forEach(item => {
                item.classList.remove("open");
                item.querySelector(".menu-trigger")?.setAttribute("aria-expanded", "false");
            });
            if (location.hash.startsWith("#topbar-menu-") || location.hash === "#topbar") {
                history.replaceState(null, "", `${location.pathname}${location.search}`);
            }
        }

        function syncTopbarMenu() {
            topbarLinks.querySelectorAll(".menu-group").forEach(group => {
                const trigger = group.querySelector(".menu-trigger");
                const panel = group.querySelector(".menu-panel");
                const open = Boolean(panel && `#${panel.id}` === location.hash);
                group.classList.toggle("open", open);
                trigger?.setAttribute("aria-expanded", open ? "true" : "false");
            });
        }

        topbarLinks.addEventListener("click", event => {
            const trigger = event.target.closest(".menu-trigger");
            if (!trigger) return;
            const alreadyOpen = trigger.getAttribute("aria-expanded") === "true";
            if (alreadyOpen) {
                event.preventDefault();
                closeTopbarMenus();
                return;
            }
            requestAnimationFrame(syncTopbarMenu);
        });

        document.addEventListener("click", event => {
            if (event.target.closest(".menu-group")) return;
            closeTopbarMenus();
        });

        window.addEventListener("hashchange", syncTopbarMenu);

        themeButtons.forEach(button => {
            button.addEventListener("click", () => {
                applyTheme(button.dataset.themeMode, true);
                focusInput();
            });
        });

        if (typeof systemThemeQuery.addEventListener === "function") {
            systemThemeQuery.addEventListener("change", () => {
                if (dataState.themeMode === "system") applyTheme("system", false);
            });
        } else if (typeof systemThemeQuery.addListener === "function") {
            systemThemeQuery.addListener(() => {
                if (dataState.themeMode === "system") applyTheme("system", false);
            });
        }

        commandInput.addEventListener("input", updateInputMirror);
        commandInput.addEventListener("keydown", handleKeydown);
        window.addEventListener("keydown", event => {
            if (event.key === "Escape") {
                closeTopbarMenus();
            }
            if (!dataState.gameKeyHandler) return;
            if (event.target === commandInput) return;
            handleKeydown(event);
        });

        async function boot() {
            applyTheme(dataState.themeMode, false);
            const loginTime = setLoginStatus();
            appendText(`Last login: ${loginTime} on tty1`);
            welcomeLines.forEach(line => appendLine(line));
            newPrompt();
            const params = new URLSearchParams(location.search);
            const commandBatch = params.get("cmds");
            const commandsToRun = commandBatch ? commandBatch.split(";").map(item => item.trim()).filter(Boolean) : [params.get("cmd")].filter(Boolean);
            for (const command of commandsToRun) {
                setCurrentInput(command);
                await submit();
            }
            focusInput();
        }

        window.addEventListener("load", () => {
            boot();
        });
    </script>
</body>

</html>
