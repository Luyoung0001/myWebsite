<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>shell</title>
    <meta name="description" content="A quiet shell-style personal page." />
    <meta name="theme-color" content="#000000" />
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='black'/%3E%3Cpath d='M14 38l8-8-8-8' fill='none' stroke='%23d7d7d7' stroke-width='5' stroke-linecap='square' stroke-linejoin='round'/%3E%3Cpath d='M30 44h20' stroke='%23d7d7d7' stroke-width='5' stroke-linecap='square'/%3E%3C/svg%3E" />
    <style>
        :root {
            color-scheme: dark;
            --bg: #000;
            --panel: #050505;
            --panel-2: #090909;
            --border: #1c1c1c;
            --frame-border: #2a2a2a;
            --window-border: #1b1b1b;
            --window-top: #101010;
            --window-bottom: #070707;
            --topbar-bg: #050505;
            --topbar-border: #1c1c1c;
            --hover-border: #303030;
            --hover-bg: #101010;
            --terminal-open-bg: #020202;
            --panel-solid: #030303;
            --code-bg: #0c0c0c;
            --code-border: #242424;
            --pre-bg: #050505;
            --pre-border: #202020;
            --blockquote-border: #303030;
            --fg: #d7d7d7;
            --dim: #808080;
            --blue: #5fafff;
            --green: #87d787;
            --red: #ff5f5f;
            --yellow: #d7af5f;
            --shadow: 0 24px 80px rgba(0, 0, 0, .38), inset 0 1px 0 rgba(255, 255, 255, .04);
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        :root[data-theme="light"] {
            color-scheme: light;
            --bg: #eef1f5;
            --panel: #f7f8fb;
            --panel-2: #ffffff;
            --border: #d7dce4;
            --frame-border: #c7cfd9;
            --window-border: #d5dce5;
            --window-top: #f9fbff;
            --window-bottom: #edf1f7;
            --topbar-bg: rgba(248, 250, 253, .92);
            --topbar-border: #d8dee7;
            --hover-border: #bcc7d5;
            --hover-bg: #edf3fb;
            --terminal-open-bg: #f4f7fb;
            --panel-solid: #ffffff;
            --code-bg: #f4f7fb;
            --code-border: #dce3ec;
            --pre-bg: #f6f8fb;
            --pre-border: #d7dee7;
            --blockquote-border: #cfd8e4;
            --fg: #1f2733;
            --dim: #677386;
            --blue: #2563eb;
            --green: #1f7a36;
            --red: #c93d3d;
            --yellow: #a06a00;
            --shadow: 0 24px 80px rgba(43, 55, 72, .12), inset 0 1px 0 rgba(255, 255, 255, .75);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: var(--mono);
            font-size: 15px;
            line-height: 1.38;
            letter-spacing: 0;
        }

        body {
            height: 100svh;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            overflow: hidden;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .topbar {
            min-height: 42px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 0 12px;
            border-bottom: 1px solid var(--topbar-border);
            background: var(--topbar-bg);
        }

        .topbar-status {
            color: var(--dim);
            white-space: nowrap;
        }

        .topbar-status strong {
            color: var(--fg);
            font-weight: 400;
        }

        .topbar-login {
            color: var(--green);
        }

        .topbar-links {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            flex-wrap: wrap;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            min-width: 0;
        }

        .topbar-link,
        .menu-trigger,
        .menu-panel a {
            min-height: 28px;
            display: inline-flex;
            align-items: center;
            border: 1px solid transparent;
            border-radius: 3px;
            padding: 0 8px;
            color: var(--fg);
            font: inherit;
        }

        .topbar-link:hover,
        .topbar-link:focus-visible,
        .menu-group:hover .menu-trigger,
        .menu-group:focus-within .menu-trigger,
        .menu-panel a:hover,
        .menu-panel a:focus-visible {
            border-color: var(--hover-border);
            background: var(--hover-bg);
            color: var(--green);
            outline: none;
        }

        .menu-group {
            position: relative;
            display: inline-flex;
        }

        .menu-trigger {
            background: transparent;
            cursor: pointer;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        .menu-trigger::after {
            content: "";
            width: 0;
            height: 0;
            margin-left: 6px;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 5px solid currentColor;
            opacity: .7;
        }

        .menu-panel {
            position: absolute;
            top: 100%;
            right: 0;
            z-index: 20;
            min-width: 180px;
            display: grid;
            gap: 2px;
            padding: 10px 6px 6px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--panel-solid);
            box-shadow: var(--shadow);
            opacity: 0;
            transform: translateY(-2px);
            pointer-events: none;
            transition: opacity 160ms ease, transform 160ms ease;
        }

        .menu-backdrop {
            display: none;
            position: fixed;
            inset: 42px 0 0;
            z-index: 19;
            cursor: default;
        }

        .menu-group:hover .menu-panel,
        .menu-group:focus-within .menu-panel,
        .menu-panel:target,
        .menu-group.open .menu-panel {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .menu-panel:target + .menu-backdrop {
            display: block;
        }

        .mobile-menu-links {
            display: none;
        }

        .menu-panel a {
            justify-content: space-between;
            width: 100%;
            white-space: nowrap;
        }

        .theme-toggle {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            padding: 2px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--panel);
            flex: 0 0 auto;
        }

        .theme-button {
            min-width: 30px;
            min-height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 0;
            border-radius: 999px;
            background: transparent;
            color: var(--dim);
            font: inherit;
            cursor: pointer;
            padding: 0 8px;
            transition: background-color 180ms ease, color 180ms ease;
        }

        .theme-button:hover,
        .theme-button:focus-visible {
            background: var(--hover-bg);
            color: var(--fg);
            outline: none;
        }

        .theme-button[aria-pressed="true"] {
            background: var(--hover-bg);
            color: var(--green);
        }

        .workspace {
            min-height: 0;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 0fr);
            align-items: stretch;
            gap: 0;
            padding: 18px;
            overflow: hidden;
            transition: grid-template-columns 420ms cubic-bezier(.2, .8, .2, 1), gap 420ms cubic-bezier(.2, .8, .2, 1), padding 420ms ease;
        }

        .workspace.reader-open {
            grid-template-columns: minmax(360px, .86fr) minmax(420px, 1.14fr);
            gap: 14px;
        }

        .workspace.reader-open.minesweeper-open {
            grid-template-columns: minmax(240px, .35fr) minmax(760px, 1.65fr);
        }

        .terminal-frame,
        .reader {
            min-width: 0;
            height: 100%;
            border: 1px solid var(--frame-border);
            border-radius: 8px;
            background: var(--panel-solid);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .terminal-frame {
            width: min(960px, 100%);
            justify-self: center;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            transition: width 420ms cubic-bezier(.2, .8, .2, 1), transform 420ms cubic-bezier(.2, .8, .2, 1);
        }

        .workspace.reader-open .terminal-frame {
            width: 100%;
            justify-self: stretch;
        }

        .workspace.reader-open .help-command {
            min-width: 24ch;
        }

        .window-bar {
            min-height: 34px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--window-border);
            background: linear-gradient(180deg, var(--window-top), var(--window-bottom));
            padding: 0 12px;
            color: var(--dim);
        }

        .window-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff5f57;
            box-shadow: 16px 0 0 #ffbd2e, 32px 0 0 #28c840;
            flex: 0 0 auto;
        }

        .window-title {
            min-width: 0;
            margin-left: 34px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: .86rem;
            color: #9a9a9a;
        }

        #terminal {
            min-width: 0;
            height: 100%;
            padding: 10px 12px;
            overflow: auto;
            outline: none;
            white-space: pre-wrap;
            word-break: break-word;
            cursor: text;
            user-select: text;
            transition: background-color 420ms ease, padding 420ms ease;
        }

        .workspace.reader-open #terminal {
            background: var(--terminal-open-bg);
        }

        .line {
            display: block;
            min-height: 1.38em;
            user-select: text;
        }

        .prompt-line {
            display: flex;
            align-items: baseline;
            min-width: 0;
        }

        .prompt-prefix {
            flex: 0 0 auto;
            white-space: pre;
        }

        .prompt {
            color: var(--green);
        }

        .path {
            color: var(--blue);
        }

        .error {
            color: var(--red);
        }

        .dim {
            color: var(--dim);
        }

        .dir {
            color: var(--blue);
            font-weight: 700;
        }

        .exe {
            color: var(--green);
            font-weight: 700;
        }

        .warn {
            color: var(--yellow);
        }

        .cmd-command,
        .cmd-action {
            color: var(--green);
            font-weight: 700;
        }

        .cmd-number,
        .cmd-link {
            color: var(--blue);
        }

        .cmd-flag {
            color: var(--yellow);
        }

        .help-command {
            display: inline-block;
            min-width: 30ch;
            vertical-align: top;
        }

        .help-desc {
            color: var(--dim);
        }

        .input-slot {
            position: relative;
            display: block;
            flex: 1 1 0;
            min-width: 0;
            vertical-align: baseline;
        }

        .input-mirror {
            overflow-wrap: anywhere;
            display: block;
            min-height: 1.38em;
            white-space: pre-wrap;
            word-break: break-word;
            pointer-events: none;
        }

        .input-mirror:empty::after {
            content: "\00a0";
        }

        .terminal-input {
            display: inline-block;
            position: absolute;
            inset: 0;
            width: 100%;
            min-width: 2ch;
            border: 0;
            outline: 0;
            padding: 0;
            background: transparent;
            color: transparent;
            font: inherit;
            line-height: inherit;
            caret-color: var(--fg);
            vertical-align: baseline;
            appearance: none;
            border-radius: 0;
            user-select: text;
        }

        .terminal-input::placeholder {
            color: #505050;
        }

        .hint {
            color: var(--dim);
        }

        .kbd {
            color: var(--fg);
        }

        .reader {
            background: linear-gradient(180deg, var(--panel-2), var(--panel));
            opacity: 0;
            transform: translateX(18px);
            pointer-events: none;
            user-select: text;
            transition: opacity 340ms ease, transform 420ms cubic-bezier(.2, .8, .2, 1);
        }

        .workspace.reader-open .reader {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .reader-inner {
            height: 100%;
            display: grid;
            grid-template-rows: auto auto minmax(0, 1fr);
        }

        .reader-head {
            min-height: 42px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            align-items: center;
            gap: 8px;
            padding: 0 10px 0 12px;
            border-bottom: 1px solid var(--border);
            background: #030303;
        }

        .reader-title {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--fg);
        }

        .reader-link,
        .reader-close {
            min-height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid transparent;
            border-radius: 3px;
            background: transparent;
            color: var(--dim);
            font: inherit;
            padding: 0 8px;
            cursor: pointer;
        }

        .reader-link:hover,
        .reader-link:focus-visible,
        .reader-close:hover,
        .reader-close:focus-visible {
            border-color: var(--hover-border);
            color: var(--green);
            outline: none;
        }

        .reader-body {
            min-height: 0;
            overflow: auto;
            padding: 14px 16px 18px;
            color: #d0d0d0;
            white-space: normal;
            word-break: normal;
            overflow-wrap: anywhere;
            user-select: text;
        }

        .reader-loading {
            color: var(--dim);
            white-space: pre-wrap;
        }

        .doc {
            max-width: 860px;
            margin: 0 auto;
            overflow-wrap: anywhere;
        }

        .doc-kicker {
            margin: 0 0 10px;
            color: var(--green);
            font-size: .86rem;
        }

        .doc h1 {
            margin: 0 0 14px;
            color: #f2f2f2;
            font-size: clamp(1.45rem, 2.6vw, 2rem);
            line-height: 1.22;
            font-weight: 700;
        }

        .doc h2,
        .doc h3 {
            margin: 24px 0 10px;
            color: #eeeeee;
            line-height: 1.28;
        }

        .doc h2 {
            font-size: 1.22rem;
            border-bottom: 1px solid #202020;
            padding-bottom: 7px;
        }

        .doc h3 {
            font-size: 1.05rem;
        }

        .doc p,
        .doc li {
            line-height: 1.76;
            overflow-wrap: anywhere;
        }

        .doc p {
            margin: 0 0 13px;
        }

        .doc ul,
        .doc ol {
            padding-left: 1.4rem;
        }

        .doc code {
            border: 1px solid #242424;
            border-radius: 3px;
            background: var(--code-bg);
            color: var(--green);
            padding: 1px 4px;
        }

        .doc pre {
            overflow: auto;
            max-width: 100%;
            border: 1px solid var(--pre-border);
            border-radius: 5px;
            background: var(--pre-bg);
            padding: 12px;
            line-height: 1.55;
        }

        .doc pre code {
            border: 0;
            background: transparent;
            padding: 0;
            color: #d7d7d7;
        }

        .doc blockquote {
            margin: 14px 0;
            border-left: 3px solid var(--blockquote-border);
            padding-left: 12px;
            color: #a8a8a8;
        }

        .doc a {
            color: var(--green);
            text-decoration: underline;
            text-underline-offset: 2px;
            text-decoration-thickness: 1px;
        }

        .doc a:hover,
        .doc a:focus-visible {
            color: var(--fg);
            outline: none;
        }

        .doc a:visited {
            color: #afd7af;
        }

        .doc a code {
            text-decoration: underline;
        }

        .game-shell {
            max-width: 920px;
            margin: 0 auto;
        }

        .game-shell .doc-kicker {
            margin-bottom: 6px;
        }

        .game-shell h1 {
            margin-bottom: 8px;
            font-size: clamp(1.2rem, 2vw, 1.7rem);
        }

        .game-subtitle {
            margin: 0 0 8px;
            color: var(--dim);
        }

        .game-controls {
            margin: 0 0 10px;
            color: #a6a6a6;
            font-size: .92rem;
        }

        .game-controls code {
            margin-right: 6px;
        }

        .workspace.minesweeper-open .game-shell > .doc-kicker,
        .workspace.minesweeper-open .game-shell > h1,
        .workspace.minesweeper-open .game-subtitle,
        .workspace.minesweeper-open .game-controls {
            display: none;
        }

        .workspace.minesweeper-open .reader-body {
            padding-top: 10px;
        }

        .game-stage {
            border: 1px solid #202020;
            border-radius: 6px;
            background: #070707;
            padding: 8px;
        }

        .game-hud {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 0 0 8px;
            color: #bdbdbd;
        }

        .game-status {
            color: var(--dim);
            text-align: right;
        }

        .game-focus {
            outline: none;
        }

        .game-focus:focus-visible .game-stage {
            border-color: #355f35;
            box-shadow: 0 0 0 1px rgba(135, 215, 135, .18);
        }

        .snake-grid {
            display: grid;
            grid-template-columns: repeat(14, minmax(0, 1fr));
            gap: 3px;
            aspect-ratio: 1;
            max-width: min(100%, 380px);
            margin: 0 auto;
        }

        .snake-cell {
            border-radius: 3px;
            background: #0d0d0d;
            box-shadow: inset 0 0 0 1px #141414;
        }

        .snake-cell.snake-head {
            background: #d7f7a2;
            box-shadow: inset 0 0 0 1px #8eb65a;
        }

        .snake-cell.snake-body {
            background: #87d787;
            box-shadow: inset 0 0 0 1px #4f8f4f;
        }

        .snake-cell.snake-food {
            background: #ff6f61;
            box-shadow: inset 0 0 0 1px #c64239;
        }

        .tiles-2048 {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
            max-width: min(100%, 320px);
            margin: 0 auto;
        }

        .tile-2048 {
            aspect-ratio: 1;
            border-radius: 6px;
            display: grid;
            place-items: center;
            font-size: clamp(1rem, 3vw, 1.4rem);
            border: 1px solid #252525;
            background: #111;
            color: #8d8d8d;
        }

        .tile-2048[data-value="2"] { background: #1b2a17; color: #dff8cd; }
        .tile-2048[data-value="4"] { background: #22371d; color: #e6f7da; }
        .tile-2048[data-value="8"] { background: #4a3516; color: #ffe9c4; }
        .tile-2048[data-value="16"] { background: #5f4317; color: #ffe3b0; }
        .tile-2048[data-value="32"] { background: #6b3419; color: #ffd2bf; }
        .tile-2048[data-value="64"] { background: #7f2319; color: #ffd0d0; }
        .tile-2048[data-value="128"] { background: #26445e; color: #d8ecff; }
        .tile-2048[data-value="256"] { background: #315679; color: #e1f0ff; }
        .tile-2048[data-value="512"] { background: #4f3a7b; color: #efe4ff; }
        .tile-2048[data-value="1024"] { background: #6a2f7b; color: #fde6ff; }
        .tile-2048[data-value="2048"] { background: #8a7a16; color: #fff8cf; }

        .minesweeper-shell {
            display: grid;
            gap: 10px;
            color: #17202a;
        }

        .minesweeper-stage {
            border-color: #c4ccd8;
            background: #eef2f7;
            color: #17202a;
        }

        .minesweeper-stage .game-hud {
            color: #17202a;
        }

        .minesweeper-stage .game-status {
            color: #3d4a5c;
        }

        .minesweeper-topline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 10px;
            border: 2px solid #c4ccd8;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            background: #dce3ed;
            font-weight: 700;
        }

        .minesweeper-restart {
            min-width: 32px;
            min-height: 30px;
            border: 2px solid #aeb8c6;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-radius: 4px;
            background: #f6f8fb;
            color: #17202a;
            font: 700 1rem/1 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            cursor: pointer;
        }

        .minesweeper-restart:active {
            border-color: #ffffff;
            border-top-color: #aeb8c6;
            border-left-color: #aeb8c6;
        }

        .minesweeper-board-wrap {
            max-width: 100%;
            overflow: auto;
            padding-bottom: 4px;
        }

        .minesweeper-resizer {
            width: min(100%, 860px);
            min-width: min(100%, 520px);
            max-width: 100%;
            margin: 0 auto;
            padding: 0 12px 12px 0;
            resize: horizontal;
            overflow: auto;
            box-sizing: border-box;
            container-type: inline-size;
        }

        .minesweeper-resizer::after {
            content: "";
            display: block;
            width: 18px;
            height: 18px;
            margin: -18px 0 0 auto;
            background:
                linear-gradient(135deg, transparent 45%, #8b96a6 46%, #8b96a6 54%, transparent 55%),
                linear-gradient(135deg, transparent 62%, #8b96a6 63%, #8b96a6 70%, transparent 71%);
            opacity: .75;
        }

        .minesweeper-board {
            --mine-cols: 32;
            display: grid;
            grid-template-columns: repeat(var(--mine-cols), minmax(0, 1fr));
            gap: 2px;
            width: 100%;
            margin: 0 auto;
            padding: 6px;
            border: 2px solid #c4ccd8;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            background: #cfd7e3;
        }

        .mine-cell {
            aspect-ratio: 1;

        function formatByteGiB(value) {
            if (!Number.isFinite(value) || value <= 0) return "unknown";
            return `${value} GiB`;
        }

        function detectBrowserFromUA(ua = "") {
            if (!ua) return "unknown";
            if (/Edg\//.test(ua)) return "Microsoft Edge";
            if (/OPR\//.test(ua)) return "Opera";
            if (/Chrome\//.test(ua) && !/Edg\//.test(ua)) return "Google Chrome";
            if (/Firefox\//.test(ua)) return "Firefox";
            if (/Safari\//.test(ua) && /Version\//.test(ua) && !/Chrome\//.test(ua)) return "Safari";
            return "unknown";
        }

        function detectEngine(ua = "") {
            if (/AppleWebKit\//.test(ua) && /Chrome\//.test(ua)) return "Blink";
            if (/AppleWebKit\//.test(ua) && /Safari\//.test(ua) && !/Chrome\//.test(ua)) return "WebKit";
            if (/Gecko\//.test(ua) && /Firefox\//.test(ua)) return "Gecko";
            return "unknown";
        }

        function detectOS(ua = "", platform = "") {
            const source = `${ua} ${platform}`;
            if (/Windows NT 10\.0/.test(source)) return "Windows 10/11";
            if (/Windows NT 6\.3/.test(source)) return "Windows 8.1";
            if (/Windows NT 6\.1/.test(source)) return "Windows 7";
            if (/Android/.test(source)) return "Android";
            if (/(iPhone|iPad|iPod)/.test(source)) return "iOS/iPadOS";
            if (/Mac OS X|MacIntel|Macintosh/.test(source)) return "macOS";
            if (/Linux|X11/.test(source)) return "Linux";
            return platform || "unknown";
        }

        function detectGPU() {
            try {
                const canvas = document.createElement("canvas");
                const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
                if (!gl) return "unavailable";
                const extension = gl.getExtension("WEBGL_debug_renderer_info");
                if (extension) {
                    const renderer = gl.getParameter(extension.UNMASKED_RENDERER_WEBGL);
                    if (renderer) return renderer;
                }
                return gl.getParameter(gl.RENDERER) || "available";
            } catch {
                return "unavailable";
            }
        }

        function detectNetwork() {
            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (!connection) return "unavailable";
            const parts = [];
            if (connection.effectiveType) parts.push(connection.effectiveType);
            if (Number.isFinite(connection.downlink)) parts.push(`${connection.downlink}Mb/s`);
            if (typeof connection.rtt === "number") parts.push(`${connection.rtt}ms`);
            return parts.join(" / ") || "available";
        }

        async function collectBrowserNeofetch() {
            const userAgent = navigator.userAgent || "";
            const platform = navigator.platform || "unknown";
            const language = navigator.language || "unknown";
            const languages = Array.isArray(navigator.languages) && navigator.languages.length
                ? navigator.languages.join(", ")
                : language;
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || "unknown";
            const screenInfo = `${window.screen.width}x${window.screen.height} @${window.devicePixelRatio || 1}x`;
            const viewport = `${window.innerWidth}x${window.innerHeight}`;
            const browser = detectBrowserFromUA(userAgent);
            const engine = detectEngine(userAgent);
            const os = detectOS(userAgent, platform);
            const cores = navigator.hardwareConcurrency || "unknown";
            const memory = formatByteGiB(navigator.deviceMemory);
            const network = detectNetwork();
            const gpu = detectGPU();

            let brands = browser;
            let architecture = "unknown";
            let bitness = "unknown";
            let mobile = /Mobile|Android|iPhone|iPad|iPod/i.test(userAgent) ? "yes" : "no";

            if (navigator.userAgentData) {
                try {
                    const highEntropy = await navigator.userAgentData.getHighEntropyValues([
                        "architecture",
                        "bitness",
                        "model",
                        "platformVersion",
                        "uaFullVersion"
                    ]);
                    architecture = highEntropy.architecture || architecture;
                    bitness = highEntropy.bitness || bitness;
                    mobile = navigator.userAgentData.mobile ? "yes" : "no";
                    if (Array.isArray(navigator.userAgentData.brands) && navigator.userAgentData.brands.length) {
                        brands = navigator.userAgentData.brands.map(item => `${item.brand} ${item.version}`).join(", ");
                    }
                    if (highEntropy.platformVersion && os !== "unknown") {
                        brands = `${brands} / ${highEntropy.platformVersion}`;
                    }
                } catch {
                    // Ignore UA-CH failures and keep legacy UA-derived values.
                }
            }

            return {
                browser,
                brands,
                engine,
                os,
                host: location.host || "luliang.online",
                origin: location.origin || projectUrl,
                platform,
                language,
                languages,
                timezone,
                screenInfo,
                viewport,
                cores,
                memory,
                network,
                gpu,
                architecture,
                bitness,
                mobile
            };
        }

        function launchSnake() {
            const { root, status, focus } = startGameShell(
                "snake",
                "terminal game",
                ["Arrows move", "R restart", "Esc close"],
                "local shell game"
            );
            const size = 14;
            const cells = [];
            const grid = document.createElement("div");
            grid.className = "snake-grid";
            for (let index = 0; index < size * size; index += 1) {
                const cell = document.createElement("div");
                cell.className = "snake-cell";
                cells.push(cell);
                grid.appendChild(cell);
            }
            root.appendChild(grid);

            let direction = { x: 1, y: 0 };
            let pending = direction;
            let snake = [{ x: 6, y: 7 }, { x: 5, y: 7 }, { x: 4, y: 7 }];
            let food = { x: 10, y: 7 };
            let score = 0;
            let stopped = false;
            let timer = null;

            function snakeTickMs() {
                return Math.max(80, 240 - (snake.length - 3) * 10);
            }

            function scheduleTick() {
                if (timer) clearInterval(timer);
                timer = setInterval(step, snakeTickMs());
            }

            function keyOf(point) {
                return `${point.x},${point.y}`;
            }

            function spawnFood() {
                const occupied = new Set(snake.map(keyOf));
                const slots = [];
                for (let y = 0; y < size; y += 1) {
                    for (let x = 0; x < size; x += 1) {
                        const id = `${x},${y}`;
                        if (!occupied.has(id)) slots.push({ x, y });
                    }
                }
                food = slots[Math.floor(Math.random() * slots.length)] || food;
            }

            function paint() {
                cells.forEach(cell => {
                    cell.className = "snake-cell";
                });
                snake.forEach((segment, index) => {
                    const cell = cells[segment.y * size + segment.x];
                    if (!cell) return;
                    cell.classList.add(index === 0 ? "snake-head" : "snake-body");
                });
                const foodCell = cells[food.y * size + food.x];
                if (foodCell) foodCell.classList.add("snake-food");
                status.textContent = stopped ? `score ${score}  |  game over` : `score ${score}`;
            }

            function restart() {
                direction = { x: 1, y: 0 };
                pending = direction;
                snake = [{ x: 6, y: 7 }, { x: 5, y: 7 }, { x: 4, y: 7 }];
                food = { x: 10, y: 7 };
                score = 0;
                stopped = false;
                scheduleTick();
                paint();
            }

            function step() {
                if (stopped) return;
                direction = pending;
                const head = snake[0];
                const next = { x: head.x + direction.x, y: head.y + direction.y };
                if (next.x < 0 || next.y < 0 || next.x >= size || next.y >= size || snake.some(segment => segment.x === next.x && segment.y === next.y)) {
                    stopped = true;
                    paint();
                    return;
                }
                snake.unshift(next);
                if (next.x === food.x && next.y === food.y) {
                    score += 1;
                    spawnFood();
                    scheduleTick();
                } else {
                    snake.pop();
                }
                paint();
            }

            restart();
            setGameHandler(event => {
                const map = {
                    ArrowUp: { x: 0, y: -1 },
                    ArrowDown: { x: 0, y: 1 },
                    ArrowLeft: { x: -1, y: 0 },
                    ArrowRight: { x: 1, y: 0 }
                };
                if (event.key in map) {
                    const next = map[event.key];
                    if (next.x + direction.x !== 0 || next.y + direction.y !== 0) {
                        pending = next;
                    }
                    event.preventDefault();
                    return true;
                }
                if (event.key.toLowerCase() === "r") {
                    restart();
                    event.preventDefault();
                    return true;
                }
                if (event.key === "Escape") {
                    closeReader();
                    event.preventDefault();
                    return true;
                }
                return false;
            }, () => {
                if (timer) clearInterval(timer);
            });
            focus?.focus({ preventScroll: true });
        }

        function launch2048() {
            const { root, status, focus } = startGameShell(
                "2048",
                "terminal game",
                ["Arrows move", "R restart", "Esc close"],
                "local shell game"
            );
            const board = document.createElement("div");
            board.className = "tiles-2048";
            const tiles = [];
            for (let i = 0; i < 16; i += 1) {
                const tile = document.createElement("div");
                tile.className = "tile-2048";
                tiles.push(tile);
                board.appendChild(tile);
            }
            root.appendChild(board);

            let grid = Array.from({ length: 4 }, () => Array(4).fill(0));
            let score = 0;
            let over = false;

            function emptyCells() {
                const cells = [];
                for (let y = 0; y < 4; y += 1) {
                    for (let x = 0; x < 4; x += 1) {
                        if (!grid[y][x]) cells.push({ x, y });
                    }
                }
                return cells;
            }

            function addRandomTile() {
                const slots = emptyCells();
                if (!slots.length) return;
                const { x, y } = slots[Math.floor(Math.random() * slots.length)];
                grid[y][x] = Math.random() < 0.9 ? 2 : 4;
            }

            function draw() {
                for (let y = 0; y < 4; y += 1) {
                    for (let x = 0; x < 4; x += 1) {
                        const value = grid[y][x];
                        const tile = tiles[y * 4 + x];
                        tile.dataset.value = String(value || 0);
                        tile.textContent = value ? String(value) : "";
                    }
                }
                status.textContent = over ? `score ${score}  |  no moves` : `score ${score}`;
            }

            function compress(line) {
                const values = line.filter(Boolean);
                const merged = [];
                let gained = 0;
                for (let i = 0; i < values.length; i += 1) {
                    if (values[i] && values[i] === values[i + 1]) {
                        const next = values[i] * 2;
                        merged.push(next);
                        gained += next;
                        i += 1;
                    } else {
                        merged.push(values[i]);
                    }
                }
                while (merged.length < 4) merged.push(0);
                return { line: merged, gained };
            }

            function move(direction) {
                const snapshot = JSON.stringify(grid);
                let gained = 0;
                if (direction === "left" || direction === "right") {
                    grid = grid.map(row => {
                        const source = direction === "right" ? [...row].reverse() : [...row];
                        const result = compress(source);
                        gained += result.gained;
                        return direction === "right" ? result.line.reverse() : result.line;
                    });
                } else {
                    const next = Array.from({ length: 4 }, () => Array(4).fill(0));
                    for (let x = 0; x < 4; x += 1) {
                        const column = grid.map(row => row[x]);
                        const source = direction === "down" ? [...column].reverse() : column;
                        const result = compress(source);
                        gained += result.gained;
                        const finalLine = direction === "down" ? result.line.reverse() : result.line;
                        finalLine.forEach((value, y) => {
                            next[y][x] = value;
                        });
                    }
                    grid = next;
                }
                if (JSON.stringify(grid) !== snapshot) {
                    score += gained;
                    addRandomTile();
                    over = !canMove();
                    draw();
                }
            }

            function canMove() {
                if (emptyCells().length) return true;
                for (let y = 0; y < 4; y += 1) {
                    for (let x = 0; x < 4; x += 1) {
                        const value = grid[y][x];
                        if (grid[y]?.[x + 1] === value || grid[y + 1]?.[x] === value) return true;
                    }
                }
                return false;
            }

            function restart() {
                grid = Array.from({ length: 4 }, () => Array(4).fill(0));
                score = 0;
                over = false;
                addRandomTile();
                addRandomTile();
                draw();
            }

            restart();
            setGameHandler(event => {
                const mapping = {
                    ArrowLeft: "left",
                    ArrowRight: "right",
                    ArrowUp: "up",
                    ArrowDown: "down"
                };
                if (mapping[event.key]) {
                    move(mapping[event.key]);
                    event.preventDefault();
                    return true;
                }
                if (event.key.toLowerCase() === "r") {
                    restart();
                    event.preventDefault();
                    return true;
                }
                if (event.key === "Escape") {
                    closeReader();
                    event.preventDefault();
                    return true;
                }
                return false;
            });
            focus?.focus({ preventScroll: true });
        }

        function launchMinesweeper() {
            const settings = { width: 32, height: 19, mines: 125 };
            const { root, status, focus } = startGameShell(
                "minesweeper",
                "terminal game",
                ["Left open", "Right/F flag", "Double/C chord", "R restart", "Esc close"],
                "local shell game"
            );
            root.closest(".game-stage")?.classList.add("minesweeper-stage");
            workspace.classList.add("minesweeper-open");
            const shell = document.createElement("div");
            shell.className = "minesweeper-shell";
            shell.innerHTML = `
                <div class="minesweeper-topline">
                    <span>32 x 19 / 125 mines</span>
                    <button class="minesweeper-restart" id="mine-restart" type="button" title="restart">R</button>
                </div>
                <div class="minesweeper-board-wrap">
                    <div class="minesweeper-resizer">
                        <div class="minesweeper-board" id="mine-board" role="grid" aria-label="minesweeper board"></div>
                    </div>
                </div>
            `;
            root.appendChild(shell);

            const restartButton = shell.querySelector("#mine-restart");
            const board = shell.querySelector("#mine-board");
            restartButton.addEventListener("keydown", event => {
                event.stopPropagation();
            });

            let width = settings.width;
            let height = settings.height;
            let mines = settings.mines;
            let cells = [];
            let buttons = [];
            let firstMove = true;
            let stateText = "ready";
            let flags = 0;
            let revealed = 0;
            let cursor = { x: 0, y: 0 };
            let startedAt = 0;
            let elapsed = 0;
            let timer = null;

            function indexOf(x, y) {
                return y * width + x;
            }

            function cellAt(x, y) {
                if (x < 0 || y < 0 || x >= width || y >= height) return null;
                return cells[indexOf(x, y)];
            }

            function neighbors(cell) {
                const items = [];
                for (let y = cell.y - 1; y <= cell.y + 1; y += 1) {
                    for (let x = cell.x - 1; x <= cell.x + 1; x += 1) {
                        if (x === cell.x && y === cell.y) continue;
                        const next = cellAt(x, y);
                        if (next) items.push(next);
                    }
                }
                return items;
            }

            function stopTimer() {
                if (timer) clearInterval(timer);
                timer = null;
            }

            function startTimer() {
                if (timer) return;
                startedAt = Date.now() - elapsed * 1000;
                timer = setInterval(() => {
                    elapsed = Math.floor((Date.now() - startedAt) / 1000);
                    paint();
                }, 1000);
            }

            function placeMines(safeCell) {
                const safeZone = new Set([indexOf(safeCell.x, safeCell.y)]);
                neighbors(safeCell).forEach(item => safeZone.add(indexOf(item.x, item.y)));
                let slots = cells.filter(cell => !safeZone.has(indexOf(cell.x, cell.y)));
                if (slots.length < mines) {
                    slots = cells.filter(cell => cell !== safeCell);
                }
                for (let i = slots.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [slots[i], slots[j]] = [slots[j], slots[i]];
                }
                slots.slice(0, mines).forEach(cell => {
                    cell.mine = true;
                });
                cells.forEach(cell => {
                    cell.count = cell.mine ? 0 : neighbors(cell).filter(item => item.mine).length;
                });
            }

            function revealMines(hitCell) {
                cells.forEach(cell => {
                    if (cell.mine) cell.revealed = true;
                });
                if (hitCell) hitCell.hit = true;
            }

            function checkWin() {
                if (stateText === "lost") return;
                if (revealed === width * height - mines) {
                    stateText = "cleared";
                    stopTimer();
                    cells.forEach(cell => {
                        if (cell.mine && cell.mark !== 1) {
                            cell.mark = 1;
                            flags += 1;
                        }
                    });
                }
            }

            function revealCell(cell) {
                if (!cell || stateText === "lost" || stateText === "cleared" || cell.revealed || cell.mark === 1) return;
                if (firstMove) {
                    placeMines(cell);
                    firstMove = false;
                    stateText = "running";
                    startTimer();
                }
                if (cell.mine) {
                    cell.revealed = true;
                    stateText = "lost";
                    stopTimer();
                    revealMines(cell);
                    paint();
                    return;
                }
                const stack = [cell];
                while (stack.length) {
                    const current = stack.pop();
                    if (!current || current.revealed || current.mark === 1 || current.mine) continue;
                    current.revealed = true;
                    current.mark = 0;
                    revealed += 1;
                    if (current.count === 0) {
                        neighbors(current).forEach(next => {
                            if (!next.revealed && next.mark !== 1) stack.push(next);
                        });
                    }
                }
                checkWin();
                paint();
            }

            function cycleMark(cell) {
                if (!cell || cell.revealed || stateText === "lost" || stateText === "cleared") return;
                if (cell.mark === 0) {
                    cell.mark = 1;
                    flags += 1;
                } else if (cell.mark === 1) {
                    cell.mark = 2;
                    flags -= 1;
                } else {
                    cell.mark = 0;
                }
                paint();
            }

            function chordCell(cell) {
                if (!cell || !cell.revealed || cell.count === 0 || stateText === "lost" || stateText === "cleared") return;
                const around = neighbors(cell);
                const flagCount = around.filter(item => item.mark === 1).length;
                if (flagCount !== cell.count) return;
                around.forEach(item => {
                    if (!item.revealed && item.mark !== 1) revealCell(item);
                });
                paint();
            }

            function setCursor(cell) {
                if (!cell) return;
                cursor = { x: cell.x, y: cell.y };
                paint();
            }

            function paint() {
                board.style.setProperty("--mine-cols", String(width));
                cells.forEach(cell => {
                    const button = buttons[indexOf(cell.x, cell.y)];
                    button.className = "mine-cell";
                    button.textContent = "";
                    button.dataset.count = String(cell.revealed ? cell.count : 0);
                    button.setAttribute("aria-label", `cell ${cell.x + 1},${cell.y + 1}`);
                    button.classList.toggle("cursor", cell.x === cursor.x && cell.y === cursor.y);
                    if (cell.revealed) {
                        button.classList.add("revealed");
                        if (cell.mine) {
                            button.textContent = "*";
                            button.classList.add(cell.hit ? "mine-hit" : "mine-safe");
                        } else if (cell.count > 0) {
                            button.textContent = String(cell.count);
                        }
                    } else if (cell.mark === 1) {
                        button.textContent = "⚑";
                        button.classList.add("flagged");
                    } else if (cell.mark === 2) {
                        button.textContent = "?";
                        button.classList.add("question");
                    }
                });
                status.textContent = `mines ${Math.max(0, mines - flags)}  |  time ${elapsed}s  |  ${stateText}`;
            }

            function buildBoard() {
                stopTimer();
                ({ width, height, mines } = settings);
                cells = [];
                buttons = [];
                firstMove = true;
                stateText = "ready";
                flags = 0;
                revealed = 0;
                elapsed = 0;
                cursor = { x: 0, y: 0 };
                board.innerHTML = "";
                for (let y = 0; y < height; y += 1) {
                    for (let x = 0; x < width; x += 1) {
                        const cell = { x, y, mine: false, count: 0, revealed: false, mark: 0, hit: false };
                        const button = document.createElement("button");
                        button.className = "mine-cell";
                        button.type = "button";
                        button.setAttribute("role", "gridcell");
                        button.addEventListener("click", event => {
                            focus?.focus({ preventScroll: true });
                            setCursor(cell);
                            if (event.shiftKey) cycleMark(cell);
                            else if (cell.revealed) chordCell(cell);
                            else revealCell(cell);
                        });
                        button.addEventListener("contextmenu", event => {
                            event.preventDefault();
                            focus?.focus({ preventScroll: true });
                            setCursor(cell);
                            cycleMark(cell);
                        });
                        button.addEventListener("dblclick", event => {
                            event.preventDefault();
                            focus?.focus({ preventScroll: true });
                            setCursor(cell);
                            chordCell(cell);
                        });
                        button.addEventListener("auxclick", event => {
                            if (event.button !== 1) return;
                            event.preventDefault();
                            focus?.focus({ preventScroll: true });
                            setCursor(cell);
                            chordCell(cell);
                        });
                        cells.push(cell);
                        buttons.push(button);
                        board.appendChild(button);
                    }
                }
                paint();
            }

            restartButton.addEventListener("click", () => {
                buildBoard();
                focus?.focus({ preventScroll: true });
            });

            buildBoard();
            setGameHandler(event => {
                const key = event.key.toLowerCase();
                const current = cellAt(cursor.x, cursor.y);
                if (event.key === "ArrowUp" || event.key === "ArrowDown" || event.key === "ArrowLeft" || event.key === "ArrowRight") {
                    const delta = {
                        ArrowUp: { x: 0, y: -1 },
                        ArrowDown: { x: 0, y: 1 },
                        ArrowLeft: { x: -1, y: 0 },
                        ArrowRight: { x: 1, y: 0 }
                    }[event.key];
                    setCursor(cellAt(Math.min(width - 1, Math.max(0, cursor.x + delta.x)), Math.min(height - 1, Math.max(0, cursor.y + delta.y))));
                    event.preventDefault();
                    return true;
                }
                if (event.code === "Space" || event.key === "Enter") {
                    if (current?.revealed) chordCell(current);
                    else revealCell(current);
                    event.preventDefault();
                    return true;
                }
                if (key === "f") {
                    cycleMark(current);
                    event.preventDefault();
                    return true;
                }
                if (key === "c") {
                    chordCell(current);
                    event.preventDefault();
                    return true;
                }
                if (key === "r") {
                    buildBoard();
                    event.preventDefault();
                    return true;
                }
                if (event.key === "Escape") {
                    closeReader();
                    event.preventDefault();
                    return true;
                }
                return false;
            }, stopTimer);
            focus?.focus({ preventScroll: true });
        }

        function launchMario() {
            const { root, status, focus } = startGameShell(
                "mario",
                "terminal game",
                ["Space jump", "R restart", "Esc close"],
                "runner tribute"
            );
            const canvas = document.createElement("canvas");
            canvas.className = "runner-canvas";
            canvas.width = 760;
            canvas.height = 280;
            root.appendChild(canvas);
            const context = canvas.getContext("2d");

            let raf = 0;
            let last = 0;
            let score = 0;
            let alive = true;
            let obstacleTick = 0;
            let obstacles = [];
            const player = { x: 90, y: 0, width: 24, height: 26, velocity: 0 };
            const gravity = 980;
            const jumpVelocity = -360;
            const ground = 210;

            function restart() {
                score = 0;
                alive = true;
                obstacleTick = 0;
                obstacles = [];
                player.y = 0;
                player.velocity = 0;
                last = 0;
                cancelAnimationFrame(raf);
                raf = requestAnimationFrame(loop);
            }

            function jump() {
                if (!alive) return;
                if (player.y >= ground - player.height - 1) {
                    player.velocity = jumpVelocity;
                }
            }

            function update(delta) {
                if (!alive) return;
                obstacleTick += delta;
                if (obstacleTick > 1.3) {
                    obstacleTick = 0;
                    obstacles.push({
                        x: canvas.width + 30,
                        width: 18 + Math.random() * 20,
                        height: 22 + Math.random() * 22
                    });
                }
                player.velocity += gravity * delta;
                player.y += player.velocity * delta;
                const floor = ground - player.height;
                if (player.y > floor) {
                    player.y = floor;
                    player.velocity = 0;
                }
                obstacles = obstacles
                    .map(item => ({ ...item, x: item.x - 260 * delta }))
                    .filter(item => item.x + item.width > -20);
                score += delta * 10;
                const hit = obstacles.some(item => (
                    player.x < item.x + item.width &&
                    player.x + player.width > item.x &&
                    player.y + player.height > ground - item.height
                ));
                if (hit) alive = false;
            }

            function draw() {
                context.clearRect(0, 0, canvas.width, canvas.height);
                context.fillStyle = "#0a0a0a";
                context.fillRect(0, 0, canvas.width, canvas.height);

                context.strokeStyle = "#202020";
                context.lineWidth = 2;
                context.beginPath();
                context.moveTo(0, ground);
                context.lineTo(canvas.width, ground);
                context.stroke();

                context.fillStyle = "#87d787";
                context.fillRect(player.x, player.y, player.width, player.height);
                context.fillStyle = "#d7f7a2";
                context.fillRect(player.x + 16, player.y + 6, 5, 5);

                context.fillStyle = "#ff6f61";
                obstacles.forEach(item => {
                    context.fillRect(item.x, ground - item.height, item.width, item.height);
                });

                context.fillStyle = "#b8b8b8";
                context.font = "16px monospace";
                context.fillText(`distance ${Math.floor(score)}m`, 16, 28);
                status.textContent = alive ? `distance ${Math.floor(score)}m` : `distance ${Math.floor(score)}m  |  crashed`;

                if (!alive) {
                    context.fillStyle = "rgba(0, 0, 0, 0.55)";
                    context.fillRect(0, 0, canvas.width, canvas.height);
                    context.fillStyle = "#f0f0f0";
                    context.font = "bold 24px monospace";
                    context.fillText("Game Over", canvas.width / 2 - 70, 120);
                    context.font = "14px monospace";
                    context.fillText("press R to restart or Esc to exit", canvas.width / 2 - 130, 150);
                }
            }

            function loop(timestamp) {
                if (!last) last = timestamp;
                const delta = Math.min((timestamp - last) / 1000, 0.03);
                last = timestamp;
                update(delta);
                draw();
                raf = requestAnimationFrame(loop);
            }

            restart();
            setGameHandler(event => {
                if (event.code === "Space" || event.key === "ArrowUp") {
                    jump();
                    event.preventDefault();
                    return true;
                }
                if (event.key.toLowerCase() === "r") {
                    restart();
                    event.preventDefault();
                    return true;
                }
                if (event.key === "Escape") {
                    closeReader();
                    event.preventDefault();
                    return true;
                }
                return false;
            }, () => {
                cancelAnimationFrame(raf);
            });
            focus?.focus({ preventScroll: true });
        }

        function newPrompt() {

        function freezePrompt(command) {

        function saveHistory() {
            state.history = state.history.slice(-100);
            localStorage.setItem("history", JSON.stringify(state.history));
        }

        function parse(input) {
            const tokens = [];
            let token = "";
            let quote = "";
            let escaped = false;

            for (const char of input) {
                if (escaped) {
                    token += char;
                    escaped = false;
                    continue;
                }
                if (char === "\\") {
                    escaped = true;
                    continue;
                }
                if ((char === "\"" || char === "'") && !quote) {
                    quote = char;
                    continue;
                }
                if (char === quote) {
                    quote = "";
                    continue;
                }
                if (/\s/.test(char) && !quote) {
                    if (token) tokens.push(token);
                    token = "";
                    continue;
                }
                token += char;
            }

            if (token) tokens.push(token);
            return { tokens, quoteOpen: Boolean(quote) };
        }

        function commandTokenClass(token, index, tokens) {
            if (index === 0 && commands.includes(token)) return "cmd-command";
            if (tokens[index - 1] === "/" && commands.includes(token)) return "cmd-command";
            if (/^https?:\/\//i.test(token) || /^mailto:/i.test(token)) return "cmd-link";
            if (/^-{1,2}[\w-]+$/.test(token)) return "cmd-flag";
            if (/^\d+$/.test(token)) return "cmd-number";
            if (links[token]) return "cmd-link";
            if (/^<[^>]+>$/.test(token) || /^\[[^\]]+]$/.test(token)) return "cmd-number";
            if (index === 1 && ["github", "web"].includes(tokens[0])) return "cmd-action";
            return "";
        }

        function highlightCommandLine(commandLine) {
            const parsed = parse(commandLine);
            if (!parsed.tokens.length) return escapeHtml(commandLine);
            let cursor = 0;
            return parsed.tokens.map((token, index) => {
                const position = commandLine.indexOf(token, cursor);
                const prefix = position > cursor ? escapeHtml(commandLine.slice(cursor, position)) : "";
                cursor = position + token.length;
                const cls = commandTokenClass(token, index, parsed.tokens);
                const html = cls ? `<span class="${cls}">${escapeHtml(token)}</span>` : escapeHtml(token);
                return `${prefix}${html}`;
            }).join("") + escapeHtml(commandLine.slice(cursor));
        }

        function resolvePath(path = ".") {
            if (path === "~") return "/home/guest";
            if (path.startsWith("~/")) return `/home/guest/${path.slice(2)}`;
            if (path.startsWith("/")) return normalizePath(path);
            return normalizePath(`${state.cwd}/${path}`);
        }

        function normalizePath(path) {
            const parts = [];
            for (const part of path.split("/")) {
                if (!part || part === ".") continue;
                if (part === "..") {
                    parts.pop();
                    continue;
                }
                parts.push(part);
            }
            return `/${parts.join("/")}`;
        }

        function parentPath(path) {
            const parts = path.split("/").filter(Boolean);
            parts.pop();
            return `/${parts.join("/")}`;
        }

        function baseName(path) {
            return path.split("/").filter(Boolean).at(-1) || "/";
        }

        function stat(path) {
            if (files[path]) return files[path];
            const parent = files[parentPath(path)];
            return parent?.entries?.[baseName(path)] || null;
        }

        function fileContent(path) {
            const node = stat(path);
            return node?.type === "file" ? node.content : null;
        }

        function listDir(path, long = false, all = false) {
            const dir = files[path];
            if (!dir || dir.type !== "dir") return null;

            const entries = Object.entries(dir.entries);
            const names = all ? [[".", { type: "dir", mode: "drwxr-xr-x", size: 96 }], ["..", { type: "dir", mode: "drwxr-xr-x", size: 96 }], ...entries] : entries;

            if (!long) {
                return names.map(([name, node]) => {
                    const cls = node.type === "dir" ? "dir" : "";
                    return cls ? `<span class="${cls}">${escapeHtml(name)}</span>` : escapeHtml(name);
                }).join("  ");
            }

            const total = names.length * 4;
            const rows = names.map(([name, node]) => {
                const mode = node.mode || (node.type === "dir" ? "drwxr-xr-x" : "-rw-r--r--");
                const size = String(node.size || 96).padStart(5, " ");
                const date = "Jun 16 16:00";
                const label = node.type === "dir" ? `<span class="dir">${escapeHtml(name)}</span>` : escapeHtml(name);
                return `${mode} 1 guest guest ${size} ${date} ${label}`;
            });
            return [`total ${total}`, ...rows].join("\n");
        }

        function uniqueBy(items, keyFn) {
            const seen = new Set();
            return items.filter(item => {
                const key = keyFn(item);
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
        }

        function ensureUniqueIds(items) {
            const seen = new Map();
            return items.map(item => {
                const base = item.id || "item";
                const count = (seen.get(base) || 0) + 1;
                seen.set(base, count);
                return count === 1 ? item : { ...item, id: compactId(`${base}-${count}`, 34) };
            });
        }

        function numberedPosts(items) {
            return items.map((item, index) => ({
                ...item,
                id: String(index),
                aliases: uniqueBy([item.id, ...(item.aliases || [])].filter(Boolean), alias => alias)
            }));
        }

        function renumberPosts(items) {
            const numbered = numberedPosts(items);
            blogPosts.splice(0, blogPosts.length, ...numbered);
            return blogPosts;
        }

        function numberedRepos(items) {
            return items.map((item, index) => ({
                ...item,
                id: String(index),
                aliases: uniqueBy([item.id, ...(item.aliases || [])].filter(Boolean), alias => alias)
            }));
        }

        function renumberRepos(items) {
            const numbered = numberedRepos(items);
            repos.splice(0, repos.length, ...numbered);
            return repos;
        }

        function slugify(value, fallback) {
            const ascii = String(value || "")
                .normalize("NFKD")
                .replace(/[\u0300-\u036f]/g, "")
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, "-")
                .replace(/^-+|-+$/g, "");
            return ascii || fallback;
        }

        function compactId(value, maxLength = 30) {
            const tokens = String(value || "").split("-").filter(Boolean);
            const kept = [];

            for (const token of tokens) {
                const next = [...kept, token].join("-");
                if (next.length > maxLength && kept.length) break;
                kept.push(token);
            }

            return (kept.join("-") || String(value || "").slice(0, maxLength)).replace(/-+$/g, "");
        }

        function safeDecode(value) {
            try {
                return decodeURIComponent(value);
            } catch {
                return String(value || "");
            }
        }

        function normalizeTitle(value) {
            return String(value || "")
                .replace(/[（]/g, "(")
                .replace(/[）]/g, ")")
                .replace(/[：]/g, ":")
                .replace(/\s+/g, " ")
                .trim();
        }

        function thesisTopicSlug(value) {
            const text = normalizeTitle(value);
            if (/JIT/i.test(text) && /NES/i.test(text)) return "jit-nes";
            if (/JIT/i.test(text)) return "jit";
            if (/qemu/i.test(text)) return "qemu";
            if (/NES/i.test(text) && /mario/i.test(text)) return "nes-mario";
            if (/shell|命令/.test(text)) return "shell";
            if (/terminal/i.test(text)) return "terminal";
            if (/HDMI/i.test(text) && /buffer/i.test(text)) return "hdmi-buffer";
            if (/时间片|协作式|多任务/.test(text)) return "timeslice-os";
            if (/ps2|键盘/i.test(text)) return "ps2-keyboard";
            if (/minicom/i.test(text)) return "minicom";
            if (/uart/i.test(text)) return "uart-test";
            if (/ddr3/i.test(text) && /sd\s*卡/i.test(text)) return "ddr3-sd";
            if (/mylibc/i.test(text)) return "mylibc";
            if (/HDMI[_\s-]*test/i.test(text)) return "hdmi-test";
            if (/xOS/i.test(text)) return "xos";
            if (/hello\s*world/i.test(text)) return "hello-world";
            if (/地址空间/.test(text)) return "addr-space";
            return semanticSlug(text, "");
        }

        function semanticSlug(value, fallback) {
            const replacements = [
                ["硬件加速", "hardware-accel"],
                ["快速仿真", "fast-sim"],
                ["内联汇编", "inline-asm"],
                ["地址空间", "addr-space"],
                ["时间片", "timeslice"],
                ["协作式", "coop"],
                ["多任务", "multitask"],
                ["模拟器", "emulator"],
                ["注意点", "note"],
                ["适配", "port"],
                ["仿真", "sim"],
                ["命令", "shell"],
                ["设计", "design"],
                ["键盘", "keyboard"],
                ["测试", "test"],
                ["划分", "layout"],
                ["系统", "os"],
                ["技术", ""],
                ["利用", ""],
                ["基于", ""],
                ["更多", ""],
                ["一个", ""],
                ["的", ""],
                ["和", " "],
                ["与", " "]
            ];
            let text = normalizeTitle(value);
            for (const [from, to] of replacements) {
                text = text.replaceAll(from, ` ${to} `);
            }
            return compactId(slugify(text, fallback), 30);
        }

        function postAlias(title, url) {
            const decoded = safeDecode(url);
            if (/LA\s*框架/i.test(title) || /LA\s*框架/i.test(decoded)) return "la";
            if (/硬件加速\s*NES/i.test(title) || /硬件加速NES/i.test(decoded)) return "nes";
            if (/JIT\s*跑\s*NES/i.test(title) || /JIT.*NES/i.test(decoded)) return "jit-nes";
            if (/qemu/i.test(title) || /qemu/i.test(decoded)) return "qemu";
            return "";
        }

        function repoAlias(name) {
            const aliases = {
                Loongarch_1: "cpu",
                mydebugger: "debugger",
                trans_api: "trans-api",
                translate_all: "translator",
                cpp_design: "cpp"
            };
            return aliases[name] || "";
        }

        function mapGitHubRepo(repo) {
            const alias = repoAlias(repo.name) || slugify(repo.name, `repo-${repo.id}`);
            const owner = repo.owner?.login || "unknown";
            return {
                id: alias,
                aliases: uniqueBy([alias, repo.name, `${owner}/${repo.name}`].filter(Boolean), item => item),
                name: repo.name,
                owner,
                description: repo.description || "",
                url: repo.html_url,
                language: repo.language || "mixed",
                stars: repo.stargazers_count || 0,
                updatedAt: repo.updated_at || ""
            };
        }

        async function fetchDocument(url) {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const html = await response.text();
            return new DOMParser().parseFromString(html, "text/html");
        }

        function archivePageUrl(page) {
            return page <= 1 ? BLOG_ARCHIVES_URL : `${BLOG_ARCHIVES_URL}page/${page}/`;
        }

        function archivePageCount(doc) {
            const numbers = [...doc.querySelectorAll(".page-number")]
                .map(node => Number(node.textContent.trim()))
                .filter(Number.isFinite);
            return Math.max(1, ...numbers);
        }

        function fallbackPostTitle(url) {
            const segment = safeDecode(new URL(url).pathname.split("/").filter(Boolean).at(-1) || "post");
            return segment.replace(/[-_]+/g, " ").trim() || "untitled post";
        }

        function makePostId(title, url, date, index) {
            const normalized = normalizeTitle(title || fallbackPostTitle(url));
            const alias = postAlias(normalized, url);
            if (alias) return alias;

            const thesis = normalized.match(/^毕设\s*\(?(\d+)\)?\s*:\s*(.+)$/);
            if (thesis) {
                const topic = thesisTopicSlug(thesis[2]);
                return compactId(`thesis-${Number(thesis[1])}${topic ? `-${topic}` : ""}`, 30);
            }

            if (/loongarch/i.test(normalized) && /内联汇编/.test(normalized)) return "loongarch-inline-asm";

            const slug = semanticSlug(normalized, "");
            return slug || `post-${date.replace(/-/g, "")}-${index + 1}`;
        }

        function extractArchivePosts(doc, pageUrl) {
            return [...doc.querySelectorAll("a.list-group-item[href]")]
                .map((link, index) => {
                    const url = new URL(link.getAttribute("href"), pageUrl).href;
                    const match = url.match(/\/(20\d{2})\/(\d{2})\/(\d{2})\//);
                    if (!match) return null;

                    const titleNode = link.querySelector(".list-group-item-title");
                    const title = (titleNode?.textContent || "").replace(/\s+/g, " ").trim() || fallbackPostTitle(url);
                    const date = `${match[1]}-${match[2]}-${match[3]}`;
                    const alias = makePostId(title, url, date, index);
                    return { id: alias, aliases: [alias], title, date, url };
                })
                .filter(Boolean);
        }

        async function loadAllPosts() {
            if (dataState.postsLoaded) return blogPosts;
            if (dataState.postsLoading) return dataState.postsLoading;

            dataState.postsLoading = (async () => {
                const firstDoc = await fetchDocument(BLOG_ARCHIVES_URL);
                const pageCount = Math.min(archivePageCount(firstDoc), 60);
                const restPages = await Promise.all(
                    Array.from({ length: Math.max(0, pageCount - 1) }, (_, index) => fetchDocument(archivePageUrl(index + 2)))
                );
                const pages = [firstDoc, ...restPages];

                const fetched = pages.flatMap((doc, index) => extractArchivePosts(doc, archivePageUrl(index + 1)));
                renumberPosts(ensureUniqueIds(uniqueBy([...fetched, ...blogPosts], post => post.url)));
                dataState.postsLoaded = true;
                return blogPosts;
            })().finally(() => {
                dataState.postsLoading = null;
            });

            return dataState.postsLoading;
        }

        async function loadAllRepos() {
            if (dataState.reposLoaded) return repos;
            if (dataState.reposLoading) return dataState.reposLoading;

            dataState.reposLoading = (async () => {
                const fetched = [];
                for (let page = 1; page <= 10; page += 1) {
                    const response = await fetch(`${GITHUB_REPOS_API}?per_page=100&sort=updated&page=${page}`);
                    if (!response.ok) throw new Error(`GitHub HTTP ${response.status}`);
                    const payload = await response.json();
                    fetched.push(...payload);
                    if (payload.length < 100) break;
                }

                const mapped = fetched.map(mapGitHubRepo);
                const merged = uniqueBy([...mapped, ...repos], repo => `${repo.owner}/${repo.name}`);
                renumberRepos(merged);
                dataState.reposLoaded = true;
                return repos;
            })().finally(() => {
                dataState.reposLoading = null;
            });

            return dataState.reposLoading;
        }
